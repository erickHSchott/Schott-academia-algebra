<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eudaimonía: Arquitectura del Eco | Entidad Activa</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --surface: #0f172a; --signal: #22d3ee;
            --resonance: #fbbf24; --error: #f43f5e; --text: #f1f5f9;
            --font-main: 'Outfit', sans-serif; --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); font-family: var(--font-main);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- UI DE ARQUEOLOGÍA DIGITAL --- */
        .container {
            width: 100%; max-width: 700px; padding: 40px; background: var(--surface);
            border-radius: 20px; border: 1px solid rgba(34, 211, 238, 0.1);
            position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .stats { font-family: var(--font-mono); font-size: 0.8rem; color: var(--signal); letter-spacing: 2px; }

        .resonance-bar {
            width: 150px; height: 4px; background: #1e293b; border-radius: 2px; margin-top: 8px;
            overflow: hidden; position: relative; display: inline-block;
        }
        .resonance-fill { height: 100%; width: 0%; background: var(--signal); transition: 0.5s ease cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Animación de Resonancia Crítica */
        .active-resonance {
            background: linear-gradient(90deg, var(--resonance), #fff, var(--resonance));
            background-size: 200% 100%; animation: move 1.5s infinite linear, pulse 2s infinite alternate;
            box-shadow: 0 0 15px var(--resonance); width: 100% !important;
        }
        @keyframes move { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes pulse { from { opacity: 0.8; } to { opacity: 1; } }

        /* --- VISTAS --- */
        .view { display: none; animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 300; letter-spacing: -1px; margin-bottom: 20px; color: var(--signal); }
        p { line-height: 1.7; color: #94a3b8; margin-bottom: 25px; font-size: 0.95rem; }

        .btn {
            width: 100%; padding: 18px; background: transparent; color: var(--text);
            border: 1px solid rgba(34, 211, 238, 0.3); border-radius: 12px;
            cursor: pointer; font-family: var(--font-mono); font-size: 0.85rem;
            transition: 0.3s ease; margin-bottom: 15px; text-align: left;
            position: relative; overflow: hidden;
        }
        .btn:hover:not(:disabled) { background: rgba(34, 211, 238, 0.05); border-color: var(--signal); color: #fff; }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; border-color: #334155; }

        .option { 
            background: #1e293b; padding: 16px; border-radius: 12px; margin-bottom: 12px;
            cursor: pointer; border: 1px solid transparent; transition: 0.2s ease; font-family: var(--font-mono); font-size: 0.9rem;
        }
        .option:hover { border-color: var(--signal); background: rgba(34, 211, 238, 0.03); }
        .correct { background: rgba(16, 185, 129, 0.1) !important; border-color: #10b981 !important; color: #10b981; }
        .wrong { background: rgba(244, 63, 94, 0.1) !important; border-color: var(--error) !important; color: var(--error); }

        .insight-box {
            margin-top: 30px; padding: 25px; border-radius: 15px;
            border: 1px solid rgba(34, 211, 238, 0.15);
            background: rgba(34, 211, 238, 0.02); display: none; animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- LA MASCOTA (ENTIDAD DE OBSERVACIÓN) --- */
        .mascot-frame { 
            width: 100px; height: 100px; display: block; margin: 0 auto 30px;
            opacity: 0.6; filter: drop-shadow(0 0 10px var(--signal));
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="stats">OBSERVADOR: <span id="lives-ui">ONLINE</span></div>
            <div style="text-align: right;">
                <div class="stats" style="font-size: 0.6rem;">RESONANCIA CRÍTICA</div>
                <div class="resonance-bar"><div id="res-fill" class="resonance-fill"></div></div>
            </div>
        </div>

        <div id="view-menu" class="view active">
            <img src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose1.png" class="mascot-frame" alt="Entidad Activa">
            <h1>Arquitectura del Eco</h1>
            <p>Sintonizando la frecuencia de la <b>Eudaimonía</b>. Elimina el ruido histórico para decodificar la realidad estructural del sistema.</p>
            <button class="btn" onclick="startLesson()">ACCEDER A LOS ARCHIVOS DE ENSEÑANZA 👁️</button>
            <button class="btn" onclick="startFlow('perc')" style="border-color: var(--signal);">CAPA I: PERCEPCIÓN (15 Retos) ⚡</button>
            <button class="btn" id="btn-tier2" onclick="startFlow('sim')" disabled>CAPA II: SIMETRÍA (15 Retos) ⚖️</button>
            <button class="btn" id="btn-tier3" onclick="startFlow('rest')" disabled>CAPA III: RESTAURACIÓN (Bloqueada) 🔒</button>
        </div>

        <div id="view-lesson" class="view">
            <img src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose2.png" class="mascot-frame">
            <div id="lesson-content" style="text-align: center; min-height: 300px;"></div>
            <div style="display: flex; gap: 15px;">
                <button class="btn" style="background: #1e293b; border-color: #334155; text-align: center;" onclick="changeSlide(-1)">Regresar</button>
                <button class="btn" id="btn-next-slide" style="text-align: center; border-color: var(--signal);" onclick="changeSlide(1)">Siguiente</button>
            </div>
        </div>

        <div id="view-quiz" class="view">
            <div id="q-meta" class="stats" style="margin-bottom: 10px; color: #94a3b8;">DECODIFICANDO: 1/15</div>
            <h2 id="q-text" style="margin-bottom: 30px; font-weight: 300; line-height: 1.4;"></h2>
            <div id="options"></div>
            
            <div id="insight-area" class="insight-box">
                <img src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose5.png" class="mascot-frame" style="width: 80px; height: 80px; margin-bottom: 15px;">
                <div style="color: var(--resonance); font-size: 0.7rem; margin-bottom: 10px; font-family: var(--font-mono); letter-spacing: 1px;">[FRECUENCIA SINTONIZADA]</div>
                <p id="insight-text" style="font-style: italic; font-size: 0.95rem; line-height: 1.6; color: #fff;"></p>
                <button class="btn" style="margin-top: 10px; border-color: var(--signal); text-align: center;" onclick="nextQuestion()">Continuar Secuencia ➔</button>
            </div>
        </div>

        <div id="view-results" class="view" style="text-align: center;">
            <img id="res-img" src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose5.png" class="mascot-frame" style="width: 130px; height: 130px;">
            <h1 id="res-title">Sintonía Completada</h1>
            <p id="res-msg"></p>
            <button class="btn" style="text-align: center;" onclick="location.reload()">Regresar al Núcleo</button>
        </div>
    </div>

    <script>
        /* --- MOTOR DE AUDIO SINTETIZADO --- */
        const AudioEngine = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playTone(freq, type, duration, vol = 0.1) {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            },
            success() { if(this.ctx) [261.63, 329.63, 392.00].forEach(f => this.playTone(f, 'sine', 1.0, 0.04)); },
            error() { 
                if(!this.ctx) return;
                const bufSize = this.ctx.sampleRate * 0.1;
                const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = this.ctx.createBufferSource();
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.03, this.ctx.currentTime);
                noise.buffer = buf; noise.connect(gain); gain.connect(this.ctx.destination);
                noise.start();
            },
            resonance() { 
                if(this.ctx) { this.playTone(880, 'triangle', 0.4, 0.02); this.playTone(1760, 'sine', 0.7, 0.01); }
            }
        };

        /* --- DATA: NARRATIVA Y PREGUNTAS --- */
        const lessonSlides = [
            { t: "El Ruido del Pasado", d: "La palabra 'Suma' viene del latín <i>summa</i> (lo más alto), porque los antiguos romanos escribían sus totales en la parte superior. Arrastramos historia en el lenguaje, generando interferencia.", i: "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose1.png" },
            { t: "La Incógnita (x)", d: "Cuando no conocemos un valor, usamos una <b>Incógnita</b>. No es una simple letra, es un espacio vacío en la señal. Es reconocer la falta de información honestamente.", i: "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose3.png" },
            { t: "El Eje de Simetría (=)", d: "Toda Ecuación es una balanza. El signo igual divide la realidad en dos <b>Miembros</b>. Para mantener la armonía, cada <b>Término</b> debe estar en su lugar.", i: "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose2.png" },
            { t: "Operación Inversa", d: "Despejar es aislar la verdad aplicando la <b>Operación Inversa</b>. No es magia, es deshacer el ruido paso a paso. Ese es el camino hacia la <b>Eudaimonía</b>.", i: "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose5.png" }
        ];

        /* --- BANCO DE PREGUNTAS (TIER 1 y 2) --- */
        const questions = {
            perc: [
                { q: "Traduce la señal pura: 'Un número sumado a diez'.", o: ["x + 10", "10x", "x - 10"], c: 0, i: "La palabra 'suma' viene de summa. Al usar +, limpias la historia romana y dejas solo la estructura matemática." },
                { q: "Estructura de: 'La diferencia entre dos valores desconocidos'.", o: ["a + b", "a - b", "ab"], c: 1, i: "La resta representa la distancia física entre dos realidades. Es una estructura de separación." },
                { q: "Decodifica: 'El doble de una incógnita'.", o: ["x + 2", "x²", "2x"], c: 2, i: "El coeficiente numérico (2) junto a la literal (x) indica un factor de repetición." },
                { q: "Sintoniza: 'La tercera parte de una verdad'.", o: ["x / 3", "3x", "x - 3"], c: 0, i: "Dividir es un acto de justicia: fragmentar la totalidad en partes iguales para analizarla." },
                { q: "Traduce: 'Un valor excedido en cinco unidades'.", o: ["5x", "x + 5", "x - 5"], c: 1, i: "'Excedido' es solo ruido verbal para referirse a la adición." },
                { q: "Traduce la señal: 'Diez disminuido en un número'.", o: ["x - 10", "10 / x", "10 - x"], c: 2, i: "El orden importa. El sistema original es 10, y el ruido que le quitamos es la incógnita." },
                { q: "Decodifica: 'El doble de un número, aumentado en uno'.", o: ["2(x + 1)", "2x + 1", "x + 2"], c: 1, i: "Las operaciones se construyen por capas. Primero la expansión (2x), luego la adición (+ 1)." },
                { q: "Traduce: 'El producto de dos incógnitas distintas'.", o: ["xy", "x + y", "x/y"], c: 0, i: "Cuando dos incógnitas se tocan sin operadores visibles, sus realidades se multiplican." },
                { q: "Sintoniza: 'El cuadrado de un valor'.", o: ["2x", "x + 2", "x²"], c: 2, i: "El exponente no es una multiplicación común; es el sistema interactuando consigo mismo." },
                { q: "Traduce: 'La mitad de un número, más tres'.", o: ["(x/2) + 3", "(x+3)/2", "2x + 3"], c: 0, i: "La jerarquía es la ley de gravedad del álgebra. Primero fragmentamos (x/2), luego acumulamos (+ 3)." },
                { q: "Decodifica el tiempo: 'Mi edad dentro de cinco años'.", o: ["x + 5", "5x", "x - 5"], c: 0, i: "El tiempo es solo otra variable de adición en la arquitectura del universo." },
                { q: "Si 'suma' es agrupar hacia lo alto, traduce 'El total de tres valores distintos'.", o: ["3x", "a + b + c", "abc"], c: 1, i: "Acumular realidades distintas sin mezclarlas. Cada incógnita mantiene su identidad única." },
                { q: "Sintoniza la frecuencia de: 'El número anterior a x'.", o: ["x + 1", "x - 1", "1 - x"], c: 1, i: "Retroceder un paso en el cosmos es restar la unidad fundamental: x - 1." },
                { q: "Traduce: 'El sucesor de una incógnita'.", o: ["2x", "x - 1", "x + 1"], c: 2, i: "Avanzar en la línea del tiempo lógico siempre es añadir la unidad constante: + 1." },
                { q: "Decodifica: 'El triple de un número, disminuido en su mitad'.", o: ["3x/2", "3x - x/2", "x/3 - 2"], c: 1, i: "Un mismo valor puede ser expandido (3x) y fragmentado (x/2) en la misma ecuación." }
            ],
            sim: [
                { q: "En el sistema 2x + 4 = 12, ¿qué rol cumple el signo '='?", o: ["Anuncia un resultado final.", "Es el Eje de Simetría.", "Indica que debemos sumar."], c: 1, i: "El igual no es una orden de 'calcula esto'. Es una declaración de que ambos lados pesan exactamente lo mismo." },
                { q: "Identifica el Primer Miembro de la ecuación: 5x - 3 = 22", o: ["5x - 3", "22", "5x"], c: 0, i: "El Primer Miembro es toda la estructura que se encuentra a la izquierda del Eje de Simetría." },
                { q: "Identifica el Segundo Miembro de la ecuación: 7 = x + 2", o: ["x + 2", "7", "x"], c: 0, i: "La incógnita no siempre está en el Primer Miembro. El universo no tiene 'izquierda' o 'derecha', solo equilibrio." },
                { q: "Analiza la arquitectura: ¿Qué elementos separan a los Términos dentro de un Miembro?", o: ["Las letras y los números.", "Los signos de suma (+) y resta (-).", "Los signos de multiplicar y dividir."], c: 1, i: "Un Término es un bloque indivisible. Solo los signos + y - funcionan como muros entre bloque y bloque." },
                { q: "¿Cuántos Términos hay en el Primer Miembro de: 3x + 5 - y = 10?", o: ["Un término", "Dos términos", "Tres términos"], c: 2, i: "3x es el primer bloque, +5 es el segundo, y -y es el tercero. Tres entidades en el mismo espacio." },
                { q: "En la expresión -4x, ¿cómo llamamos al número -4?", o: ["Constante", "Incógnita", "Coeficiente"], c: 2, i: "El Coeficiente es el multiplicador. Nos dice cuántas veces existe la incógnita en esa dimensión." },
                { q: "En la ecuación x + 8 = 20, ¿cómo llamamos al número 8?", o: ["Coeficiente", "Constante", "Literal"], c: 1, i: "Es una Constante porque su valor estructural (ocho) no cambia, a diferencia del vacío de la x." },
                { q: "Para mantener la simetría: Si sumo 5 al Primer Miembro, ¿qué debo hacer en el Segundo?", o: ["Restar 5", "Sumar 5", "No hacer nada"], c: 1, i: "La Ley de Oro del Álgebra: Lo que le haces a un lado de la balanza, se lo haces exactamente igual al otro." },
                { q: "¿Por qué llamamos a estas estructuras 'Ecuaciones de Primer Grado'?", o: ["Porque se enseñan en primero de secundaria.", "Porque la incógnita (x) no tiene exponente visible (es x¹).", "Porque solo tienen un término."], c: 1, i: "x¹ significa que la incógnita habita en una sola dimensión (una línea). No hay curvas (x²), solo simetría pura." },
                { q: "En el término -7x, ¿cuál es el signo de este bloque de información?", o: ["Positivo (+)", "Negativo (-)", "No tiene signo"], c: 1, i: "Todo término incluye su signo. El - le pertenece al 7x como una propiedad fundamental de su existencia." },
                { q: "Si la balanza x = 6 está en equilibrio, ¿qué pasa si multiplico AMBOS miembros por 2?", o: ["Se rompe la balanza.", "Obtengo 2x = 12 (Sigue en equilibrio).", "Obtengo 2x = 6."], c: 1, i: "Puedes escalar la realidad al doble o a la mitad; mientras lo hagas en ambos lados, la simetría es eterna." },
                { q: "Identifica la estructura correcta: ¿Puede un Miembro tener un solo Término?", o: ["Sí, como en x = 5.", "No, siempre deben ser dos.", "Solo si es cero."], c: 0, i: "La simplicidad máxima. Un miembro puede ser tan simple como una sola incógnita aislada de todo ruido." },
                { q: "¿Qué significa que la balanza marque x = 0?", o: ["Que la ecuación está mal.", "Que la incógnita no tiene peso/valor en este sistema.", "Que debemos sumar 1."], c: 1, i: "El cero no es un error, es un dato. Es descubrir que el espacio vacío, en efecto, no contiene masa." },
                { q: "Decodifica: ¿Qué es fundamentalmente una 'Ecuación'?", o: ["Una cuenta muy larga.", "Una afirmación de que dos expresiones distintas valen lo mismo.", "Un conjunto de letras al azar."], c: 1, i: "Es la poesía de la lógica: decir que 2+2 y 4, aunque se escriben distinto, son la misma verdad." },
                { q: "Si resto 'x' en el Primer Miembro y resto 'x' en el Segundo Miembro...", o: ["La ecuación se destruye.", "La simetría se mantiene intacta.", "La x desaparece para siempre."], c: 1, i: "Has comprendido la Simetría. Puedes mover la materia del cosmos, siempre y cuando mantengas la balanza neutra." }
            ],
            rest: [
                { q: "Placeholder Capa 3", o: ["1", "2", "3"], c: 0, i: "Placeholder" }
            ]
        };

        /* --- LÓGICA DE JUEGO --- */
        let currentTier = '', qIdx = 0, streak = 0, lives = 5, hasResonance = false, activeBank = [], curSlide = 0;
        let prog = JSON.parse(localStorage.getItem('eudaimonia_v5')) || { l: false, w: false, s: false };

        function updateMenu() {
            document.getElementById('btn-tier2').disabled = !prog.w;
            document.getElementById('btn-tier3').disabled = !prog.s;
            if(prog.w) document.getElementById('btn-tier2').style.borderColor = "var(--signal)";
            if(prog.s) document.getElementById('btn-tier3').style.borderColor = "var(--signal)";
        }
        updateMenu();

        function startLesson() { showView('view-lesson'); curSlide = 0; renderSlide(); }
        function renderSlide() {
            const s = lessonSlides[curSlide];
            document.querySelector('#view-lesson .mascot-frame').src = s.i;
            document.getElementById('lesson-content').innerHTML = `<h2>${s.t}</h2><p>${s.d}</p>`;
            document.getElementById('btn-next-slide').innerText = curSlide === lessonSlides.length-1 ? "Finalizar Decodificación" : "Siguiente Señal";
        }
        function changeSlide(dir) {
            curSlide += dir;
            if (curSlide < 0) showView('view-menu');
            else if (curSlide >= lessonSlides.length) { prog.l = true; updateMenu(); showView('view-menu'); }
            else renderSlide();
        }

        function startFlow(tier) {
            AudioEngine.init();
            currentTier = tier;
            activeBank = [...questions[tier]];
            activeBank.sort(() => Math.random() - 0.5);
            qIdx = 0; lives = 5; streak = 0; hasResonance = false;
            updateUI(); showView('view-quiz'); renderQuestion();
        }

        function renderQuestion() {
            const data = activeBank[qIdx];
            document.getElementById('q-meta').innerText = `DECODIFICANDO CAPA ${currentTier.toUpperCase()}: ${qIdx + 1}/${activeBank.length}`;
            document.getElementById('q-text').innerText = data.q;
            
            const container = document.getElementById('options');
            container.innerHTML = '';
            data.o.forEach((opt, idx) => {
                const b = document.createElement('div'); b.className = 'option';
                b.innerText = opt; b.onclick = () => checkAnswer(idx, b);
                container.appendChild(b);
            });
            document.getElementById('insight-area').style.display = 'none';
            container.style.display = 'block';
        }

        function checkAnswer(idx, el) {
            const data = activeBank[qIdx];
            const opts = document.querySelectorAll('.option');
            opts.forEach(o => o.style.pointerEvents = 'none');

            if(idx === data.c) {
                el.classList.add('correct'); streak++;
                AudioEngine.success();
                if(streak >= 3 && !hasResonance) { hasResonance = true; AudioEngine.resonance(); }
                showInsight(data.i);
            } else {
                el.classList.add('wrong');
                opts[data.c].classList.add('correct');
                AudioEngine.error();
                if(hasResonance) hasResonance = false; else lives--;
                streak = 0;
                activeBank.push(activeBank[qIdx]); 
                setTimeout(() => { if(lives <= 0) endFlow(false); else nextQuestion(); }, 2500);
            }
            updateUI();
        }

        function showInsight(text) {
            document.getElementById('options').style.display = 'none';
            document.getElementById('insight-text').innerText = text;
            document.getElementById('insight-area').style.display = 'block';
        }

        function nextQuestion() {
            qIdx++;
            if(qIdx < activeBank.length) renderQuestion();
            else endFlow(true);
        }

        function updateUI() {
            document.getElementById('lives-ui').innerText = lives > 0 ? "✨".repeat(lives) : "CRITICAL";
            const fill = document.getElementById('res-fill');
            fill.classList.toggle('active-resonance', hasResonance);
            if(!hasResonance) fill.style.width = (streak % 3) * 33 + "%";
        }

        function endFlow(success) {
            showView('view-results');
            const imgRes = document.getElementById('res-img');
            if(success) {
                if(currentTier === 'perc') prog.w = true;
                if(currentTier === 'sim') prog.s = true;
                localStorage.setItem('eudaimonia_v5', JSON.stringify(prog));
                updateMenu();
                imgRes.src = "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose5.png";
                document.getElementById('res-title').innerText = "Simetría Comprendida";
                document.getElementById('res-msg').innerText = "Has asimilado las leyes de la balanza cósmica. La siguiente fase revelará cómo despejar la verdad.";
            } else {
                imgRes.src = "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose4.png";
                document.getElementById('res-title').innerText = "Atención Nublada";
                document.getElementById('res-msg').innerText = "El ruido del entorno ha ganado esta vez. Descansemos para recuperar la claridad cognitiva.";
            }
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
