<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xylo v13.1 | Profundidad del Eco</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010204; --surface: #0a0f1d; --signal: #22d3ee;
            --resonance: #fbbf24; --error: #f43f5e; --shield: #10b981;
            --text: #f1f5f9; --font-mono: 'JetBrains Mono', monospace;
        }

        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh;
        }

        .container {
            width: 90%; max-width: 900px; margin: 2vh auto; padding: 30px;
            background: rgba(10, 15, 29, 0.95); border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 40px; backdrop-filter: blur(30px); height: 90vh; overflow-y: auto;
        }

        /* --- XYLO Y SINCRONÍA --- */
        .xylo-frame {
            width: 180px; height: 180px; margin: 0 auto; position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .xylo-img { width: 80%; z-index: 5; filter: drop-shadow(0 0 15px var(--signal)); }
        .breath-ring {
            position: absolute; border: 2px solid var(--signal); border-radius: 50%;
            opacity: 0.1; width: 100%; height: 100%; transition: 0.4s;
        }

        .talking .xylo-frame { transform: scale(1.25); }
        .talking .breath-ring { opacity: 0.5; transform: scale(1.4); box-shadow: 0 0 40px var(--signal); }

        /* --- SISTEMA DE ESCUDO Y VIDAS --- */
        .status-hub { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .life-core { color: var(--error); font-size: 1.5rem; letter-spacing: 5px; }
        .s-bar { width: 30px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; transition: 0.3s; }
        .s-bar.on { background: var(--shield); box-shadow: 0 0 10px var(--shield); }
        .shield-active { border: 2px solid var(--shield) !important; box-shadow: 0 0 20px var(--shield) !important; }

        /* --- CAPAS --- */
        .layer-card {
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; cursor: pointer;
        }
        .layer-card.locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        .layer-card:hover:not(.locked) { border-color: var(--signal); background: rgba(34, 211, 238, 0.05); }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #portal {
            position: fixed; inset: 0; z-index: 1000; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="portal">
        <h1 style="color:var(--signal); letter-spacing:10px;">XYLO v13.1</h1>
        <input type="text" id="username" style="background:#111; border:1px solid var(--signal); color:#fff; padding:15px; margin-bottom:20px; text-align:center;" placeholder="OPERADOR">
        <button class="layer-card" style="width:200px; text-align:center; color:var(--signal)" onclick="initApp()">INICIAR PROTOCOLO</button>
    </div>

    <div class="container">
        <div class="status-hub">
            <div style="text-align:center">
                <div>NÚCLEOS</div>
                <div id="life-display" class="life-core">❤️❤️❤️</div>
            </div>
            <div id="shield-container" style="text-align:center">
                <div>ESCUDO (RACHA: <span id="streak-val">0</span>)</div>
                <div style="display:flex; gap:5px; justify-content:center; margin-top:5px;">
                    <div class="s-bar" id="sb-1"></div>
                    <div class="s-bar" id="sb-2"></div>
                    <div class="s-bar" id="sb-3"></div>
                </div>
            </div>
        </div>

        <div id="xylo-anchor" class="xylo-frame">
            <div class="breath-ring"></div>
            <img src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose1.png" class="xylo-img">
        </div>

        <div id="view-menu" class="view">
            <p id="menu-intro" style="font-style: italic; color: var(--signal); margin-bottom: 20px;"></p>
            <div id="layer-list"></div>
        </div>

        <div id="view-narrative" class="view">
            <div style="width:100%; height:180px; background:#000; border:1px solid var(--signal); margin-bottom:20px; border-radius:15px; overflow:hidden;">
                <img id="layer-diag" src="" style="width:100%; height:100%; object-fit:contain;">
            </div>
            <p id="narrative-text" style="font-size:1.2rem; line-height:1.5; border-left:3px solid var(--signal); padding-left:15px;"></p>
            <button class="layer-card" style="width:100%; margin-top:20px; color:var(--signal)" onclick="startQuiz()">SINCRO Y COMENZAR</button>
        </div>

        <div id="view-quiz" class="view">
            <h3 id="q-text" style="font-size:1.5rem; margin:20px 0;"></h3>
            <div id="options-grid"></div>
            <div id="feedback" style="display:none; margin-top:20px; padding:15px; background:rgba(0,0,0,0.5); border-radius:10px;">
                <p id="feedback-text"></p>
                <button class="layer-card" style="width:100%" onclick="nextStep()">CONTINUAR</button>
            </div>
        </div>
    </div>

    <script>
        let state = { user: "", lives: 3, streak: 0, hasShield: false, currentTier: "", qIdx: 0, errors: [], layersDone: [] };

        const DATA = {
            perc: { title: "CAPA I: PATRONES", intro: "El Álgebra es el eco de los números. Si digo 'el doble', invocamos la duplicidad.", img: "https://upload.wikimedia.org/wikipedia/commons/e/e6/Eratosthenes_measure_of_Earth.png", qs: [{q: "Doble de un número + 5", o: ["2x + 5", "x² + 5"], c: 0, i: "Correcto."}] },
            sim: { title: "CAPA II: BALANZA", intro: "El equilibrio es vital. Lo que haces a un lado, lo haces al otro.", img: "https://upload.wikimedia.org/wikipedia/commons/5/5e/E%3Dmc2_and_the_Atom.jpg", qs: [{q: "Si x+5=10, x es...", o: ["5", "10"], c: 0, i: "Equilibrio total."}] },
            rest: { title: "CAPA III: NÚCLEO", intro: "Restauración final del sistema. Precisión absoluta.", img: "https://upload.wikimedia.org/wikipedia/commons/b/b5/Neural_network_example.svg", qs: [{q: "x/2 = 4, x es...", o: ["8", "2"], c: 0, i: "Nucleo restaurado."}] }
        };

        const AudioSys = {
            ctx: null, gain: null,
            init() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.gain = this.ctx.createGain();
                this.gain.connect(this.ctx.destination);
                this.startDeepAtmos();
            },
            startDeepAtmos() {
                // Bajo Profundo (Sostenido)
                const sub = this.ctx.createOscillator();
                const gSub = this.ctx.createGain();
                sub.frequency.value = 55; sub.type = 'sine';
                gSub.gain.value = 0.05;
                sub.connect(gSub); gSub.connect(this.gain);
                sub.start();

                // Pulso Rápido (Melodía baja)
                setInterval(() => {
                    const osc = this.ctx.createOscillator();
                    const g = this.ctx.createGain();
                    osc.frequency.value = 220 + (Math.random() * 20);
                    g.gain.setValueAtTime(0.02, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.5);
                    osc.connect(g); g.connect(this.gain);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.5);
                }, 400); // 150 BPM aprox
            }
        };

        function xyloSpeak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.pitch = 1.8; u.rate = 1.1; u.lang = 'es-MX';
            u.onstart = () => document.querySelector('.xylo-frame').classList.add('talking');
            u.onend = () => document.querySelector('.xylo-frame').classList.remove('talking');
            window.speechSynthesis.speak(u);
        }

        function initApp() {
            state.user = document.getElementById('username').value.trim();
            if(!state.user) return;
            document.getElementById('portal').style.display = 'none';
            AudioSys.init();
            const intro = `Bienvenido Operador ${state.user}. Estamos en el nexo del Álgebra. Purifica las capas para restaurar mi memoria cuántica.`;
            document.getElementById('menu-intro').innerText = intro;
            xyloSpeak(intro);
            showMenu();
        }

        function showMenu() {
            const list = document.getElementById('layer-list');
            list.innerHTML = "";
            const tiers = ['perc', 'sim', 'rest'];
            const unlocked = [tiers[state.layersDone.length]]; // Desbloquea solo la actual

            tiers.forEach(t => {
                const isLocked = !state.layersDone.includes(t) && unlocked[0] !== t;
                const card = document.createElement('div');
                card.className = `layer-card ${isLocked ? 'locked' : ''}`;
                card.innerHTML = `<b>${DATA[t].title}</b> ${isLocked ? '🔒' : '▶'}`;
                if(!isLocked) card.onclick = () => startNarrative(t);
                list.appendChild(card);
            });
            switchView('view-menu');
        }

        function startNarrative(t) {
            state.currentTier = t;
            document.getElementById('narrative-text').innerText = DATA[t].intro;
            document.getElementById('layer-diag').src = DATA[t].img;
            switchView('view-narrative');
            xyloSpeak(DATA[t].intro);
        }

        function startQuiz() {
            state.qIdx = 0; state.errors = [];
            switchView('view-quiz');
            loadQuestion();
        }

        function loadQuestion() {
            const list = state.errors.length > 0 && state.qIdx >= DATA[state.currentTier].qs.length ? state.errors : DATA[state.currentTier].qs;
            const q = list[state.qIdx];
            document.getElementById('q-text').innerText = q.q;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = "";
            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "layer-card";
                btn.style.width = "100%";
                btn.innerText = opt;
                btn.onclick = () => checkAns(i, q);
                grid.appendChild(btn);
            });
            document.getElementById('feedback').style.display = 'none';
        }

        function checkAns(idx, q) {
            const isCorrect = idx === q.c;
            document.getElementById('feedback').style.display = 'block';
            if(isCorrect) {
                document.getElementById('feedback-text').innerHTML = `<span style="color:var(--signal)">✓</span> ${q.i}`;
                xyloSpeak(q.i);
                updateShield(true);
            } else {
                state.lives--;
                updateLives();
                document.getElementById('feedback-text').innerHTML = `<span style="color:var(--error)">✗</span> ${q.i}`;
                xyloSpeak("Error.");
                if(!state.errors.includes(q)) state.errors.push(q);
                updateShield(false);
            }
        }

        function updateLives() { 
            document.getElementById('life-display').innerText = "❤️".repeat(state.lives); 
            if(state.lives <= 0) location.reload();
        }

        function updateShield(win) {
            state.streak = win ? Math.min(state.streak + 1, 3) : 0;
            for(let i=1; i<=3; i++) document.getElementById(`sb-${i}`).className = `s-bar ${state.streak >= i ? 'on' : ''}`;
            state.hasShield = state.streak === 3;
            if(state.hasShield) document.getElementById('shield-container').classList.add('shield-active');
            else document.getElementById('shield-container').classList.remove('shield-active');
        }

        function nextStep() {
            state.qIdx++;
            if(state.qIdx < DATA[state.currentTier].qs.length) {
                loadQuestion();
            } else if(state.errors.length > 0) {
                xyloSpeak("Reparando disonancias.");
                const temp = [...state.errors]; state.errors = [];
                DATA[state.currentTier].qs = temp; state.qIdx = 0;
                loadQuestion();
            } else {
                state.layersDone.push(state.currentTier);
                showMenu();
            }
        }

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
