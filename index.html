<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Álgebra Estelar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7; --accent: #f59e0b;
            --success: #22c55e; --error: #ef4444; --bg: #0f172a;
            --card: #1e293b; --text: #f8fafc;
        }
        body { 
            font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { 
            background: var(--card); padding: 25px; border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); max-width: 650px; width: 95%; 
            position: relative; overflow: hidden;
        }
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Estilos de la Presentación (Slides) */
        .slide-container { min-height: 350px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        .slide-progress { display: flex; gap: 5px; margin-bottom: 20px; }
        .step { height: 6px; flex: 1; background: #334155; border-radius: 10px; transition: 0.3s; }
        .step.active { background: var(--accent); }
        
        .regla-oro-box { 
            background: #7c2d12; border: 2px solid var(--accent); 
            padding: 15px; border-radius: 15px; margin-top: 15px;
        }

        /* Botones */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-main { 
            width: 100%; padding: 18px; background: var(--primary); color: white; border: none; 
            border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }
        .btn-sec { background: #475569; padding: 10px 20px; color: white; border: none; border-radius: 15px; cursor: pointer; }
        
        /* Quiz Styles */
        .option { background: #334155; padding: 14px; margin: 8px 0; border-radius: 12px; cursor: pointer; border: 2px solid transparent; }
        .selected-correct { background: #065f46 !important; border-color: var(--success) !important; }
        .selected-wrong { background: #7f1d1d !important; border-color: var(--error) !important; }
        .badge { background: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <div id="view-menu" class="view active">
            <h1 style="font-size: 2.5rem; text-align: center;">🚀 Academia Álgebra</h1>
            <p style="text-align: center; color: #94a3b8;">Misión 1: El Lenguaje Secreto</p>
            <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">
                <button class="btn-main" onclick="startPresentation()">📖 Ver Presentación de la Lección</button>
                <button class="btn-main" style="background:#475569" onclick="startQuiz('calentamiento')">⚡ Calentamiento (15 Retos)</button>
                <button class="btn-main" style="background:linear-gradient(to right, #ef4444, #b91c1c)" onclick="startQuiz('examen')">🏆 Examen Maestro (30 Retos)</button>
            </div>
        </div>

        <div id="view-learn" class="view">
            <div class="slide-progress" id="presentation-progress"></div>
            <div class="slide-container" id="slide-content">
                </div>
            <div class="btn-group">
                <button class="btn-sec" id="prev-slide" onclick="changeSlide(-1)">Atrás</button>
                <button class="btn-main" id="next-slide" onclick="changeSlide(1)">Siguiente</button>
            </div>
        </div>

        <div id="view-quiz" class="view">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span id="quiz-type-label" class="badge">CALENTAMIENTO</span>
                <span id="question-counter">1/15</span>
            </div>
            <div id="question-text" style="font-size: 1.3rem; font-weight: bold; margin-bottom: 20px;"></div>
            <div id="options-container"></div>
            <button id="quiz-next-btn" class="btn-main" style="display:none; margin-top:20px;" onclick="handleNextQuestion()">Continuar ➔</button>
        </div>

        <div id="view-results" class="view" style="text-align:center">
            <h2 id="result-title"></h2>
            <div id="result-score" style="font-size: 5rem; font-weight: bold; color: var(--accent);">0</div>
            <button class="btn-main" onclick="location.reload()">Regresar al Inicio 🏠</button>
        </div>
    </div>

    <script>
        // --- DATOS DE LA PRESENTACIÓN ---
        const lessonSlides = [
            { 
                title: "👋 ¡Bienvenido Recluta!", 
                text: "Hoy aprenderás el <b>Lenguaje Algebraico</b>. Es el código secreto que usan los científicos para describir el universo.",
                img: "🌌"
            },
            { 
                title: "📦 ¿Qué es una Variable?", 
                text: "En álgebra usamos letras como <b>x, y o n</b>. Piensa en ellas como <b>cajas misteriosas</b> donde puedes guardar cualquier número.",
                img: "🎁"
            },
            { 
                title: "⚠️ REGLA DE ORO", 
                text: "¡No más 'x' para multiplicar! Se confunde con la letra x.<br><div class='regla-oro-box'><b>Correcto:</b> 3x (3 veces x)<br><b>Incorrecto:</b> 3 x x</div>",
                img: "🚫"
            },
            { 
                title: "➕ Suma y Resta", 
                text: "<b>Aumentar</b> es sumar (+).<br><b>Diferencia</b> o <b>Disminuir</b> es restar (-).<br><i>Ejemplo: 'Tu edad hace 5 años' es <b>x - 5</b></i>",
                img: "⚖️"
            },
            { 
                title: "✖️ Multiplicar y Dividir", 
                text: "<b>Doble</b> es 2x. <b>Triple</b> es 3x.<br><b>Mitad</b> es x/2. <b>Cociente</b> es x/y.",
                img: "🍕"
            },
            { 
                title: "🚀 ¡Misión Lista!", 
                text: "¿Estás listo para probar tus nuevos poderes ninja? Vamos al calentamiento.",
                img: "🏆"
            }
        ];

        // --- DATOS DE LOS QUIZZES ---
        const bankCalentamiento = [
            { q: "Un número cualquiera", a: ["x", "10", "n + 1", "x²"], c: 0 },
            { q: "La suma de un número y diez", a: ["10x", "x + 10", "x - 10", "10/x"], c: 1 },
            { q: "El triple de un número", a: ["x + 3", "3x", "x³", "3/x"], c: 1 },
            { q: "Un número disminuido en cinco", a: ["5 - x", "x - 5", "x/5", "5x"], c: 1 },
            { q: "El cuadrado de un número", a: ["2x", "x + 2", "x²", "x/2"], c: 2 },
            { q: "La mitad de un número", a: ["x/2", "x - 2", "2x", "x²"], c: 0 },
            { q: "Producto de dos números (a y b)", a: ["a + b", "a/b", "ab", "a - b"], c: 2 },
            { q: "Un número aumentado en su doble", a: ["x + 2x", "x + 2", "2x", "x²"], c: 0 },
            { q: "La diferencia de dos números", a: ["x + y", "x - y", "xy", "x/y"], c: 1 },
            { q: "El doble de un número más tres", a: ["2(x+3)", "2x + 3", "x² + 3", "3x + 2"], c: 1 },
            { q: "La tercera parte de un número", a: ["3x", "x/3", "x - 3", "x³"], c: 1 },
            { q: "Un número par", a: ["x + 2", "2x", "x/2", "x²"], c: 1 },
            { q: "Precio de libro (x) con descuento de 20 pesos", a: ["x + 20", "x - 20", "20x", "20/x"], c: 1 },
            { q: "Edad de Luis (L) hace 5 años", a: ["L + 5", "5L", "L - 5", "5 - L"], c: 2 },
            { q: "El cuádruple de un número", a: ["x + 4", "4x", "x/4", "x⁴"], c: 1 }
        ];

        // Se pueden añadir aquí las 30 del examen final siguiendo la misma estructura.

        // --- LÓGICA DE NAVEGACIÓN ---
        let currentSlide = 0;
        let currentQuiz = [];
        let quizIdx = 0;
        let score = 0;

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- LÓGICA DE PRESENTACIÓN ---
        function startPresentation() {
            currentSlide = 0;
            showView('view-learn');
            renderSlide();
        }

        function renderSlide() {
            const progress = document.getElementById('presentation-progress');
            progress.innerHTML = lessonSlides.map((_, i) => `<div class="step ${i <= currentSlide ? 'active' : ''}"></div>`).join('');
            
            const slide = lessonSlides[currentSlide];
            document.getElementById('slide-content').innerHTML = `
                <div style="font-size: 4rem; margin-bottom: 10px;">${slide.img}</div>
                <h2>${slide.title}</h2>
                <p style="font-size: 1.1rem; line-height: 1.6; color: #cbd5e1;">${slide.text}</p>
            `;

            document.getElementById('prev-slide').style.visibility = currentSlide === 0 ? 'hidden' : 'visible';
            document.getElementById('next-slide').innerText = currentSlide === lessonSlides.length - 1 ? "¡Entendido!" : "Siguiente";
        }

        function changeSlide(dir) {
            currentSlide += dir;
            if (currentSlide >= lessonSlides.length) {
                showView('view-menu');
            } else {
                renderSlide();
            }
        }

        // --- LÓGICA DE QUIZ ---
        function startQuiz(type) {
            currentQuiz = type === 'calentamiento' ? bankCalentamiento : bankCalentamiento; // Aquí iría bankExamen
            quizIdx = 0; score = 0;
            document.getElementById('quiz-type-label').innerText = type.toUpperCase();
            showView('view-quiz');
            renderQuestion();
        }

        function renderQuestion() {
            const q = currentQuiz[quizIdx];
            document.getElementById('question-counter').innerText = `${quizIdx + 1}/${currentQuiz.length}`;
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.a.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerText = opt;
                div.onclick = () => {
                    const options = document.querySelectorAll('.option');
                    options.forEach(o => o.style.pointerEvents = 'none');
                    if(i === q.c) {
                        div.classList.add('selected-correct');
                        score++;
                        confetti({ particleCount: 30, spread: 50 });
                    } else {
                        div.classList.add('selected-wrong');
                        options[q.c].classList.add('selected-correct');
                    }
                    document.getElementById('quiz-next-btn').style.display = 'block';
                };
                container.appendChild(div);
            });
            document.getElementById('quiz-next-btn').style.display = 'none';
        }

        function handleNextQuestion() {
            quizIdx++;
            if(quizIdx < currentQuiz.length) renderQuestion();
            else {
                showView('view-results');
                document.getElementById('result-title').innerText = score > (currentQuiz.length/2) ? "¡Increíble Recluta! 🏆" : "¡Sigue practicando! 💪";
                document.getElementById('result-score').innerText = `${score}/${currentQuiz.length}`;
            }
        }
    </script>
</body>
</html>
