<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xylo v13.0 | Arquitectura del Eco</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010204; --surface: #0a0f1d; --signal: #22d3ee;
            --resonance: #fbbf24; --error: #f43f5e; --shield: #10b981;
            --text: #f1f5f9; --font-mono: 'JetBrains Mono', monospace;
        }

        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh;
        }

        /* --- INTERFAZ DINÁMICA --- */
        .container {
            width: 90%; max-width: 900px; margin: 2vh auto; padding: 30px;
            background: rgba(10, 15, 29, 0.9); border: 1px solid rgba(34, 211, 238, 0.15);
            border-radius: 40px; backdrop-filter: blur(30px); position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); height: 90vh; overflow-y: auto;
        }

        /* --- XYLO Y EL ANILLO DE ALIENTO --- */
        .xylo-frame {
            width: 220px; height: 220px; margin: 0 auto; position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .xylo-img { width: 70%; z-index: 5; filter: drop-shadow(0 0 15px var(--signal)); }

        .breath-ring {
            position: absolute; border: 2px solid var(--signal);
            border-radius: 50%; opacity: 0.2; z-index: 1; width: 100%; height: 100%;
            transition: 0.4s ease;
        }

        /* Estado Hablando (Sincronía) */
        .talking .xylo-frame { transform: scale(1.2); }
        .talking .breath-ring { 
            border-width: 6px; opacity: 0.6; transform: scale(1.3);
            box-shadow: 0 0 40px var(--signal);
        }

        /* --- SISTEMA DE ENERGÍA Y ESCUDO --- */
        .status-hub { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .stat-box { text-align: center; font-family: var(--font-mono); }
        
        .life-core { color: var(--error); font-size: 1.5rem; letter-spacing: 5px; }
        
        .shield-bars { display: flex; gap: 5px; margin-top: 5px; justify-content: center; }
        .s-bar { width: 30px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; transition: 0.3s; }
        .s-bar.on { background: var(--shield); box-shadow: 0 0 10px var(--shield); }
        
        .shield-active { border: 2px solid var(--shield) !important; box-shadow: 0 0 30px var(--shield) !important; }

        /* --- CONTENIDO --- */
        .view { display: none; }
        .view.active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .option {
            background: rgba(255,255,255,0.03); padding: 18px; border-radius: 15px; margin-bottom: 12px;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); color: #fff;
            font-family: var(--font-mono); width: 100%; text-align: left; transition: 0.3s;
        }
        .option:hover:not(.locked) { border-color: var(--signal); background: rgba(34, 211, 238, 0.1); }
        .locked { opacity: 0.2; cursor: not-allowed; }

        .diagram-box {
            width: 100%; height: 200px; background: #000; border: 1px dashed var(--signal);
            margin: 20px 0; border-radius: 15px; display: flex; align-items: center; justify-content: center;
        }
        .diagram-box img { max-width: 100%; max-height: 100%; opacity: 0.7; }

        #portal {
            position: fixed; inset: 0; z-index: 1000; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="portal">
        <h1 style="color:var(--signal); letter-spacing:10px;">XYLO v13.0</h1>
        <input type="text" id="username" style="background:#111; border:1px solid var(--signal); color:#fff; padding:15px; margin-bottom:20px; text-align:center;" placeholder="NOMBRE DEL OPERADOR">
        <button class="option" style="width:200px; text-align:center; border-color:var(--signal)" onclick="initApp()">INICIAR ENLACE</button>
    </div>

    <div class="container" id="main-ui">
        <div class="status-hub">
            <div class="stat-box">
                <div>NÚCLEOS VITALES</div>
                <div id="life-display" class="life-core">❤️❤️❤️</div>
            </div>
            <div class="stat-box" id="shield-container" style="border: 1px solid transparent; padding: 5px; border-radius: 10px;">
                <div>ESCUDO (RACHA: <span id="streak-val">0</span>)</div>
                <div class="shield-bars">
                    <div class="s-bar" id="sb-1"></div>
                    <div class="s-bar" id="sb-2"></div>
                    <div class="s-bar" id="sb-3"></div>
                </div>
            </div>
        </div>

        <div id="xylo-anchor" class="xylo-frame">
            <div class="breath-ring"></div>
            <img src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose1.png" class="xylo-img" id="xylo-sprite">
        </div>

        <div id="view-menu" class="view">
            <h2 id="welcome-msg" style="color:var(--signal); font-weight:300;"></h2>
            <div id="menu-layers"></div>
        </div>

        <div id="view-narrative" class="view">
            <div class="diagram-box" id="diag-frame">
                <img id="layer-diag" src="" alt="Diagrama Conceptual">
            </div>
            <p id="narrative-text" style="font-size:1.3rem; line-height:1.6; border-left:3px solid var(--signal); padding-left:15px;"></p>
            <button class="option" style="text-align:center; border-color:var(--signal)" onclick="startQuiz()">SINCRO Y COMENZAR</button>
        </div>

        <div id="view-quiz" class="view">
            <h3 id="q-text" style="font-size:1.6rem; margin:20px 0;"></h3>
            <div id="options-grid"></div>
            <div id="feedback" style="display:none; margin-top:20px; padding:15px; background:rgba(0,0,0,0.5); border-radius:10px;">
                <p id="feedback-text"></p>
                <button class="option" style="border-color:var(--signal)" onclick="nextStep()">CONTINUAR</button>
            </div>
        </div>
    </div>

    <script>
        const PROFESSOR_EMAIL = "erickhschott@gmail.com";
        let state = {
            user: "", lives: 3, streak: 0, hasShield: false,
            currentTier: "", qIdx: 0, errors: [], 
            isReviewing: false, layersDone: []
        };

        const DATA = {
            perc: {
                title: "CAPA I: LA FUNDACIÓN",
                intro: "El Álgebra es el arte de reunir lo que está roto. No busques números, busca patrones. Si digo 'el doble', duplicas la energía. Si digo 'aumentado', expandes la realidad.",
                img: "https://upload.wikimedia.org/wikipedia/commons/e/e6/Eratosthenes_measure_of_Earth.png",
                qs: [
                    {q: "El doble de un número aumentado en 5", o: ["2x + 5", "x² + 5", "2(x+5)"], c: 0, i: "El doble es (2x), aumentado suma (+5)."},
                    {q: "La mitad de un número disminuido en 10", o: ["x/2 - 10", "10 - x/2", "x/2 + 10"], c: 0, i: "La mitad divide (x/2), disminuir resta (-10)."}
                ]
            }
        };

        // --- MOTOR DE AUDIO (MELODÍA ARMONIOSA) ---
        const AudioSys = {
            ctx: null, mainGain: null,
            init() { 
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.mainGain = this.ctx.createGain();
                this.mainGain.connect(this.ctx.destination);
                this.mainGain.gain.value = 0.2;
            },
            playNote(freq, dur) {
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                g.gain.setValueAtTime(0, this.ctx.currentTime);
                g.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + 0.1);
                g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + dur);
                osc.connect(g); g.connect(this.mainGain);
                osc.start(); osc.stop(this.ctx.currentTime + dur);
            },
            startHarmony() {
                const scale = [261.63, 293.66, 329.63, 392.00, 440.00]; // Pentatónica C
                setInterval(() => {
                    const note = scale[Math.floor(Math.random() * scale.length)];
                    this.playNote(note, 3);
                }, 4000);
            }
        };

        // --- VOZ Y SINCRONÍA ---
        function xyloSpeak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.pitch = 1.8; u.rate = 1.1; u.lang = 'es-MX';
            u.onstart = () => document.body.classList.add('talking');
            u.onend = () => document.body.classList.remove('talking');
            window.speechSynthesis.speak(u);
        }

        function initApp() {
            state.user = document.getElementById('username').value.trim();
            if(!state.user) return alert("Identificación necesaria.");
            document.getElementById('portal').style.display = 'none';
            AudioSys.init(); AudioSys.startHarmony();
            xyloSpeak(`Saludos, ${state.user}. Soy Xylo. Iniciando restauración de frecuencia.`);
            showMenu();
        }

        function showMenu() {
            const menu = document.getElementById('menu-layers');
            menu.innerHTML = "";
            const unlocked = [...state.layersDone, "perc"]; // Lógica de bloqueo
            
            Object.keys(DATA).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `option ${unlocked.includes(key) ? '' : 'locked'}`;
                btn.innerHTML = `<b>${DATA[key].title}</b>`;
                btn.onclick = () => startNarrative(key);
                menu.appendChild(btn);
            });
            document.getElementById('welcome-msg').innerText = `OPERADOR: ${state.user.toUpperCase()}`;
            switchView('view-menu');
        }

        function startNarrative(tier) {
            state.currentTier = tier;
            document.getElementById('narrative-text').innerText = DATA[tier].intro;
            document.getElementById('layer-diag').src = DATA[tier].img;
            switchView('view-narrative');
            xyloSpeak(DATA[tier].intro);
        }

        function startQuiz() {
            state.qIdx = 0; state.errors = []; state.isReviewing = false;
            switchView('view-quiz');
            loadQuestion();
        }

        function loadQuestion() {
            const list = state.isReviewing ? state.errors : DATA[state.currentTier].qs;
            const q = list[state.qIdx];
            document.getElementById('q-text').innerText = q.q;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = "";
            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option";
                btn.innerText = opt;
                btn.onclick = () => checkAns(i, q);
                grid.appendChild(btn);
            });
            document.getElementById('feedback').style.display = 'none';
        }

        function checkAns(idx, q) {
            const isCorrect = idx === q.c;
            const feedback = document.getElementById('feedback');
            const fText = document.getElementById('feedback-text');
            feedback.style.display = 'block';

            if(isCorrect) {
                fText.innerHTML = `<span style="color:var(--signal)">✓ ÉXITO:</span> ${q.i}`;
                xyloSpeak(q.i);
                updateShield(true);
            } else {
                handleError(q);
                fText.innerHTML = `<span style="color:var(--error)">✗ DISONANCIA:</span> ${q.i}`;
                xyloSpeak("Error detectado. " + q.i);
            }
        }

        function updateShield(correct) {
            if(correct) {
                state.streak++;
                if(state.streak > 3) state.streak = 3;
            } else {
                state.streak = 0;
            }
            
            // Actualizar Barras
            for(let i=1; i<=3; i++) {
                document.getElementById(`sb-${i}`).className = `s-bar ${state.streak >= i ? 'on' : ''}`;
            }

            if(state.streak === 3) {
                state.hasShield = true;
                document.getElementById('shield-container').classList.add('shield-active');
            } else {
                state.hasShield = false;
                document.getElementById('shield-container').classList.remove('shield-active');
            }
            document.getElementById('streak-val').innerText = state.streak;
        }

        function handleError(q) {
            if(state.hasShield) {
                state.streak = 0;
                updateShield(false); // Pierde escudo
                xyloSpeak("Escudo colapsado. Núcleo intacto.");
            } else {
                state.lives--;
                updateLives();
                if(state.lives <= 0) gameOver();
            }
            if(!state.errors.includes(q)) state.errors.push(q);
        }

        function updateLives() {
            document.getElementById('life-display').innerText = "❤️".repeat(state.lives);
        }

        function nextStep() {
            const list = state.isReviewing ? state.errors : DATA[state.currentTier].qs;
            state.qIdx++;
            if(state.qIdx < list.length) {
                loadQuestion();
            } else if(state.errors.length > 0) {
                state.isReviewing = true; state.qIdx = 0;
                const temp = [...state.errors]; state.errors = [];
                DATA[state.currentTier].qs = temp; // El bucle se vuelve la lista principal
                xyloSpeak("Iniciando bucle de restauración.");
                loadQuestion();
            } else {
                finishLayer();
            }
        }

        function finishLayer() {
            state.layersDone.push(state.currentTier);
            xyloSpeak("Frecuencia purificada. Enviando reporte.");
            sendReport("COMPLETADO");
            showMenu();
        }

        function gameOver() {
            xyloSpeak("Fallo crítico. Sistema fuera de línea.");
            sendReport("FALLO CRÍTICO");
            location.reload();
        }

        function sendReport(status) {
            const body = {
                operador: state.user,
                estado: status,
                vidas_restantes: state.lives,
                capas: state.layersDone.join(', ')
            };
            // Simulación de envío directo (EmailJS / Webhook)
            console.log("REPORTE ENVIADO A erickhschott@gmail.com:", body);
            // Aquí integrarías: fetch('https://api.emailjs.com/...', {method:'POST', body: JSON.stringify(body)})
        }

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
