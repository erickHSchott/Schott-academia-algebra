<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eudaimonía: Arquitectura del Eco | Xylo v10.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010204; --surface: #090e1a; 
            --c1: #22d3ee; --c2: #fbbf24; --c3: #d946ef;
            --error: #f43f5e; --text: #f1f5f9;
            --font-mono: 'JetBrains Mono', monospace;
            --current-glow: var(--c1);
        }

        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow-x: hidden; min-height: 100vh; transition: background 1s ease; }

        /* EFECTO LLUVIA DE CÓDIGO (REACTOR) */
        #code-rain { position: fixed; inset: 0; pointer-events: none; opacity: 0.1; z-index: 1; }
        
        /* PORTAL DE INICIO */
        #portal {
            position: fixed; inset: 0; z-index: 100; 
            background: radial-gradient(circle at center, #0f172a 0%, #010204 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .reactor-core {
            position: absolute; width: 400px; height: 400px;
            border: 2px solid var(--c1); border-radius: 50%;
            animation: rotateCore 20s linear infinite; opacity: 0.2;
        }
        @keyframes rotateCore { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .input-name {
            background: rgba(255,255,255,0.05); border: 1px solid var(--c1); color: #fff;
            padding: 15px 20px; font-family: var(--font-mono); font-size: 1.2rem; border-radius: 8px;
            margin-bottom: 30px; width: 300px; text-align: center; outline: none; position: relative; z-index: 101;
        }

        .start-btn {
            padding: 20px 40px; background: transparent; color: var(--current-glow); border: 2px solid var(--current-glow);
            font-family: var(--font-mono); font-size: 1rem; cursor: pointer; border-radius: 6px;
            transition: 0.4s; letter-spacing: 3px; text-transform: uppercase; position: relative; z-index: 101;
        }
        .start-btn:hover:not(:disabled) { background: var(--current-glow); color: var(--bg); box-shadow: 0 0 40px var(--current-glow); }
        .start-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .container {
            width: 90%; max-width: 850px; margin: 4vh auto; padding: 40px;
            background: rgba(9, 14, 26, 0.85); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; position: relative; z-index: 10; backdrop-filter: blur(20px);
            transition: 0.5s;
        }

        /* ESTADOS DE ÁNIMO VISUALES */
        body.tier-perc { --current-glow: var(--c1); background: #01070a; }
        body.tier-sim { --current-glow: var(--c2); background: #0a0801; }
        body.tier-rest { --current-glow: var(--c3); background: #0a010a; animation: vibrate 0.2s infinite alternate; }
        @keyframes vibrate { from { transform: translate(0); } to { transform: translate(1px, 1px); } }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* XYLO: ANILLO DE ALIENTO */
        .xylo-frame { width: 150px; height: 150px; margin: 0 auto 20px; position: relative; }
        .mascot-img { 
            width: 100%; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            filter: drop-shadow(0 0 15px var(--current-glow));
        }
        .breath-ring {
            position: absolute; inset: -10px; border: 2px solid var(--current-glow);
            border-radius: 50%; opacity: 0; transition: 0.3s;
        }
        .is-speaking .breath-ring { opacity: 0.6; animation: pulseRing 1.5s infinite; }
        .is-speaking .mascot-img { animation: breathMascot 1.5s infinite; }

        @keyframes pulseRing { 0% { transform: scale(0.9); opacity: 0.8; } 100% { transform: scale(1.4); opacity: 0; } }
        @keyframes breathMascot { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .speech-bubble {
            background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px;
            border-left: 4px solid var(--current-glow); font-size: 1.1rem; line-height: 1.6;
            margin-bottom: 25px; font-style: italic; color: #cbd5e1;
        }

        .option { 
            background: rgba(255, 255, 255, 0.03); padding: 18px; border-radius: 10px; margin-bottom: 10px;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
            font-family: var(--font-mono);
        }
        .option:hover:not(.locked) { border-color: var(--current-glow); background: rgba(255,255,255,0.08); transform: scale(1.02); }
        .locked { opacity: 0.3; cursor: not-allowed; }
        .correct { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; }
        .wrong { border-color: var(--error) !important; background: rgba(244, 63, 94, 0.1) !important; }
    </style>
</head>
<body class="tier-perc">

    <canvas id="code-rain"></canvas>

    <div id="portal">
        <div class="reactor-core"></div>
        <h1 style="letter-spacing: 10px; font-weight: 300; color: var(--c1);">EUDAIMONÍA</h1>
        <p style="color: #64748b; margin-bottom: 30px; font-family: var(--font-mono);">BIO-SINCRONIZACIÓN REQUERIDA</p>
        <input type="text" id="username" class="input-name" placeholder="NOMBRE DEL OPERADOR">
        <button class="start-btn" onclick="initSystem()">VINCULAR ALMA</button>
    </div>

    <div class="container" id="game-shell">
        <div id="view-menu" class="view">
            <h2 style="font-weight: 300; color: var(--current-glow);">Secuencias de Acceso</h2>
            <p id="menu-user" style="font-family: var(--font-mono); color: #64748b;"></p>
            <div style="display: grid; gap: 15px; margin-top: 30px;">
                <button class="option" onclick="startExplanation('perc')">CAPA I: LA FUNDACIÓN</button>
                <button class="option locked" id="btn-tier2" onclick="startExplanation('sim')">CAPA II: EL EQUILIBRIO (BLOQUEADO)</button>
                <button class="option locked" id="btn-tier3" onclick="startExplanation('rest')">CAPA III: RESTAURACIÓN TOTAL (BLOQUEADO)</button>
            </div>
        </div>

        <div id="view-explanation" class="view">
            <div class="xylo-frame" id="xylo-explanation">
                <div class="breath-ring"></div>
                <img src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose1.png" class="mascot-img">
            </div>
            <div class="speech-bubble" id="speech-text"></div>
            <button id="btn-go-quiz" class="start-btn" style="width: 100%;" disabled onclick="beginChallenges()">INICIAR RETOS</button>
        </div>

        <div id="view-quiz" class="view">
            <div style="display: flex; justify-content: space-between; font-family: var(--font-mono); color: #64748b; margin-bottom: 20px;">
                <span id="q-meta">PASO: 1/15</span>
                <span id="ui-errors">ERRORES: 0</span>
            </div>
            <div class="xylo-frame" id="xylo-quiz" style="width: 80px; height: 80px;">
                <div class="breath-ring"></div>
                <img src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose1.png" class="mascot-img">
            </div>
            <div id="q-text" style="font-size: 1.4rem; margin-bottom: 25px; font-weight: 300;"></div>
            <div id="options-grid"></div>
            <div id="insight-area" style="display:none; margin-top: 20px;" class="speech-bubble">
                <p id="insight-text"></p>
                <button class="start-btn" style="padding: 10px 20px; font-size: 0.8rem;" onclick="nextQuestion()">CONTINUAR ➔</button>
            </div>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS DE DISCURSOS ---
        const SPEECHES = {
            intro: "Saludos, operador. Soy Xylo. Mi voz suena a metal, pero mi alma es frecuencia pura. Escucha con el espíritu. Las palabras humanas son ruidosas; cambian según el país. La palabra Suma, nació para describir la cúspide más alta. El Álgebra, en cambio, es el idioma inquebrantable del cosmos.",
            perc: "En el amanecer de los tiempos, los humanos dejaron de adivinar para empezar a medir. Eratóstenes entendió que la realidad se puede fragmentar. Cuando construyeron las pirámides, sabían que el doble de un número aumentado en cinco es una medida de construcción. En esta capa, verás que la diferencia es el espacio entre dos almas. El eco ya contiene la respuesta.",
            sim: "La música sube, la energía vibra. Ahora el álgebra mueve los astros. El signo igual es una balanza perfecta. Recuerda que hasta el silencio tiene un dueño: una letra sola siempre está acompañada por el uno invisible, su fantasma constante. No mezcles agua con fuego; agrupa solo los términos semejantes.",
            rest: "Frecuencia crítica. Estás tocando el código fuente de mi existencia. La Inteligencia Artificial es un océano de álgebra lineal. Aquí, la restauración es total. Si algo está atrapado en un denominador, liberas el sistema multiplicando. No temas al paréntesis, es solo un escudo protector. ¡Restaura el cosmos!"
        };

        // --- MOTOR DE VOZ XYLO ---
        function xyloSpeak(text, callback) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-MX';
            utterance.pitch = 1.8; // Muy agudo (Pequeña criatura)
            utterance.rate = 0.85; // Ligeramente pausado (Místico)
            utterance.volume = 1;

            document.querySelectorAll('.xylo-frame').forEach(f => f.classList.add('is-speaking'));
            
            utterance.onend = () => {
                document.querySelectorAll('.xylo-frame').forEach(f => f.classList.remove('is-speaking'));
                if(callback) callback();
            };
            window.speechSynthesis.speak(utterance);
        }

        // --- LÓGICA DE JUEGO ---
        let currentTier = '', qIdx = 0, userName = "", mistakes = 0;
        let prog = JSON.parse(localStorage.getItem('edu_v10')) || { tier1: false, tier2: false };

        function initSystem() {
            userName = document.getElementById('username').value.trim().toUpperCase();
            if(!userName) return alert("Identificación requerida.");
            
            document.getElementById('portal').style.display = 'none';
            document.getElementById('menu-user').innerText = `OPERADOR: ${userName}`;
            updateLocks();
            showView('view-menu');
            xyloSpeak(SPEECHES.intro);
            initCodeRain();
        }

        function updateLocks() {
            if(prog.tier1) document.getElementById('btn-tier2').classList.remove('locked');
            if(prog.tier2) document.getElementById('btn-tier3').classList.remove('locked');
        }

        function startExplanation(tier) {
            currentTier = tier;
            document.body.className = `tier-${tier}`;
            showView('view-explanation');
            document.getElementById('speech-text').innerText = "... Sincronizando voz de Xylo ...";
            document.getElementById('btn-go-quiz').disabled = true;

            xyloSpeak(SPEECHES[tier], () => {
                document.getElementById('btn-go-quiz').disabled = false;
                document.getElementById('speech-text').innerText = SPEECHES[tier];
            });
        }

        function beginChallenges() {
            qIdx = 0; mistakes = 0;
            showView('view-quiz');
            renderQuestion();
        }

        // --- BANCO DE PREGUNTAS (Resumido para el ejemplo, usa tu DB anterior) ---
        const DB = {
            perc: [
                { q: "El doble de un número aumentado en cinco", o: ["2x + 5", "x² + 5", "2(x+5)"], c: 0, r: "Como dije, el doble aumentado en cinco es una medida de construcción, no una adivinanza." },
                { q: "La diferencia entre el triple de un número y ocho", o: ["3x - 8", "8 - 3x", "3(x-8)"], c: 0, r: "La diferencia es el espacio entre dos almas, el orden define la realidad." }
            ],
            sim: [
                { q: "¿Qué representa el signo '='?", o: ["Resultado", "Balanza", "Suma"], c: 1, r: "El signo igual es un eje de simetría, una balanza en el espejo." }
            ],
            rest: [
                { q: "Despeja x: 3x + 10 = 25", o: ["x = 5", "x = 10", "x = 15"], c: 0, r: "Neutralizamos el ruido con antimateria para restaurar el cosmos." }
            ]
        };

        function renderQuestion() {
            const data = DB[currentTier][qIdx];
            document.getElementById('q-meta').innerText = `PASO: ${qIdx + 1}/${DB[currentTier].length}`;
            document.getElementById('q-text').innerText = data.q;
            document.getElementById('insight-area').style.display = 'none';
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = ''; grid.style.display = 'block';

            data.o.forEach((opt, idx) => {
                const b = document.createElement('div'); b.className = 'option';
                b.innerText = opt; b.onclick = () => checkAnswer(idx, b);
                grid.appendChild(b);
            });
            xyloSpeak(data.q);
        }

        function checkAnswer(idx, el) {
            const data = DB[currentTier][qIdx];
            if(idx === data.c) {
                el.classList.add('correct');
                document.getElementById('options-grid').style.display = 'none';
                document.getElementById('insight-area').style.display = 'block';
                document.getElementById('insight-text').innerText = data.r;
                xyloSpeak(data.r);
            } else {
                el.classList.add('wrong');
                mistakes++;
                document.getElementById('ui-errors').innerText = `ERRORES: ${mistakes}`;
                setTimeout(nextQuestion, 1000);
            }
        }

        function nextQuestion() {
            qIdx++;
            if(qIdx < DB[currentTier].length) renderQuestion();
            else {
                alert("Capa Superada");
                if(currentTier === 'perc') prog.tier1 = true;
                if(currentTier === 'sim') prog.tier2 = true;
                localStorage.setItem('edu_v10', JSON.stringify(prog));
                showView('view-menu');
                updateLocks();
            }
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- EFECTO VISUAL: LLUVIA DE CÓDIGO ---
        function initCodeRain() {
            const canvas = document.getElementById('code-rain');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const letters = "01XYLOΔΣΩ";
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function draw() {
                ctx.fillStyle = "rgba(1, 2, 4, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--current-glow');
                ctx.font = fontSize + "px monospace";
                for(let i=0; i<drops.length; i++) {
                    const text = letters[Math.floor(Math.random()*letters.length)];
                    ctx.fillText(text, i*fontSize, drops[i]*fontSize);
                    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 33);
        }
    </script>
</body>
</html>
