<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Álgebra Estelar 🌌</title>
    <link rel="icon" href="data:,"> 
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #9F73DA; /* Púrpura Axolote */
            --secondary: #35BBB2; /* Teal Axolote */
            --accent: #f59e0b; /* Naranja Alerta */
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }

        body { 
            font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        .container { 
            background: var(--card); padding: 25px; border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); max-width: 600px; width: 92%; 
            position: relative;
        }

        /* --- UI COMPONENTS --- */
        .view { display: none; animation: slideUp 0.4s ease-out; }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .mascot-mini { width: 60px; height: 60px; border-radius: 50%; background: var(--secondary); padding: 5px; }

        .btn-main { 
            width: 100%; padding: 18px; background: var(--primary); color: white; border: none; 
            border-radius: 16px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s;
            box-shadow: 0 4px 0 #7c54b3; margin-bottom: 10px;
        }
        .btn-main:active { transform: translateY(4px); box-shadow: none; }
        
        .option { 
            background: #334155; padding: 15px; margin: 10px 0; border-radius: 14px; 
            cursor: pointer; border: 2px solid transparent; transition: 0.2s;
        }
        .option:hover { background: #475569; }
        .correct { background: #065f46 !important; border-color: var(--success) !important; }
        .wrong { background: #7f1d1d !important; border-color: var(--error) !important; }

        .progress-bar { height: 10px; background: #334155; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); width: 0%; transition: 0.5s; }

        /* --- PRESENTATION SLIDES --- */
        .slide-content { text-align: center; min-height: 380px; }
        .mascot-big { width: 180px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .mastery-badge { background: #1e293b; padding: 5px 10px; border-radius: 10px; font-size: 0.8rem; color: var(--accent); border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose1.png" class="mascot-mini" alt="Mascota">
            <div>
                <h2 style="margin:0; font-size: 1.2rem;">Álgebra Estelar</h2>
                <div id="streak-counter">🔥 Racha: 0</div>
            </div>
        </div>

        <div id="view-menu" class="view active">
            <h1 style="text-align: center;">¡Hola, Recluta!</h1>
            <p style="text-align: center; color: #94a3b8;">Elige tu próxima misión:</p>
            <button class="btn-main" onclick="startPresentation()">📖 Aprender Código Secreto</button>
            <button class="btn-main" style="background: var(--secondary); box-shadow: 0 4px 0 #28938c;" onclick="startQuiz('calentamiento')">⚡ Calentamiento (15 Retos)</button>
            <button class="btn-main" style="background: #475569; box-shadow: 0 4px 0 #2d3a4b;" onclick="startQuiz('examen')">🏆 Examen Maestro (30 Retos)</button>
            <center><button onclick="resetMastery()" style="background:none; border:none; color:#64748b; font-size:0.7rem; cursor:pointer;">Reiniciar memoria de aprendizaje</button></center>
        </div>

        <div id="view-learn" class="view">
            <div class="slide-content" id="slide-area"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn-main" style="background:#475569; box-shadow: 0 4px 0 #2d3a4b;" onclick="changeSlide(-1)">Atrás</button>
                <button class="btn-main" id="btn-next-slide" onclick="changeSlide(1)">Siguiente</button>
            </div>
        </div>

        <div id="view-quiz" class="view">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <span id="quiz-title" class="mastery-badge">MODO ADAPTATIVO</span>
                <span id="quiz-progress-text">1/15</span>
            </div>
            <div class="progress-bar"><div id="quiz-progress-fill" class="progress-fill"></div></div>
            
            <div id="question-box">
                <p id="q-text" style="font-size: 1.3rem; font-weight: bold; margin: 20px 0;"></p>
                <div id="options-box"></div>
            </div>

            <div id="feedback-box" style="display:none; text-align: center; margin-top: 15px;">
                <img id="mascot-feedback" src="" style="width: 100px;">
                <p id="feedback-text"></p>
                <button class="btn-main" onclick="nextQuestion()">Continuar ➔</button>
            </div>
        </div>

        <div id="view-results" class="view" style="text-align: center;">
            <img src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose5.png" style="width: 150px;">
            <h1 id="res-title">¡Misión Cumplida!</h1>
            <div style="font-size: 4rem; font-weight: bold; color: var(--accent);" id="res-score">0</div>
            <p id="res-msg"></p>
            <button class="btn-main" onclick="location.reload()">Regresar al Inicio 🏠</button>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS DE PREGUNTAS ---
        const questions = [
            { id: "c1", q: "Un número cualquiera", a: ["x", "1", "0", "n+1"], c: 0, bank: "calentamiento" },
            { id: "c2", q: "La suma de un número y diez", a: ["10x", "x-10", "x+10", "10/x"], c: 2, bank: "calentamiento" },
            { id: "c3", q: "El triple de un número", a: ["x+3", "x³", "3x", "3-x"], c: 2, bank: "calentamiento" },
            { id: "e1", q: "El cociente de dos números", a: ["x-y", "xy", "x/y", "x+y"], c: 2, bank: "examen" }
        ];

        let mastery = JSON.parse(localStorage.getItem('algebraMastery')) || {};

        function saveError(id) {
            if (!mastery[id]) mastery[id] = { errors: 0 };
            mastery[id].errors += 1;
            localStorage.setItem('algebraMastery', JSON.stringify(mastery));
        }

        function resolveError(id) {
            if (mastery[id] && mastery[id].errors > 0) {
                mastery[id].errors -= 1;
                localStorage.setItem('algebraMastery', JSON.stringify(mastery));
            }
        }

        function resetMastery() { localStorage.clear(); location.reload(); }

        // --- LÓGICA DE PRESENTACIÓN ---
        // URLs Corregidas a RAW
        const slides = [
            { t: "¡Bienvenido Recluta!", d: "Soy tu guía en esta misión espacial. El álgebra es el idioma de las estrellas.", i: "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose2.png" },
            { t: "¿Qué es una Variable?", d: "Es una <b>caja misteriosa</b> (como x, n o y) donde guardamos números.", i: "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose3.png" },
            { t: "La Regla de Oro", d: "⚠️ ¡No uses la 'x' para multiplicar! Se confunde. Escribe <b>3x</b> para decir 3 veces x.", i: "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose4.png" }
        ];
        let currentSlide = 0;

        function startPresentation() { showView('view-learn'); renderSlide(); }
        function renderSlide() {
            const s = slides[currentSlide];
            document.getElementById('slide-area').innerHTML = `
                <img src="${s.i}" class="mascot-big">
                <h2>${s.t}</h2>
                <p>${s.d}</p>
            `;
            document.getElementById('btn-next-slide').innerText = currentSlide === slides.length - 1 ? "¡Listo!" : "Siguiente";
        }
        function changeSlide(dir) {
            currentSlide += dir;
            if (currentSlide < 0) showView('view-menu');
            else if (currentSlide >= slides.length) showView('view-menu');
            else renderSlide();
        }

        // --- LÓGICA DEL QUIZ ---
        let activeQuiz = [];
        let qIndex = 0;
        let score = 0;
        let streak = 0;

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startQuiz(bankType) {
            let pool = questions.filter(q => q.bank === bankType || bankType === 'examen');
            pool.sort((a, b) => {
                let errA = mastery[a.id]?.errors || 0;
                let errB = mastery[b.id]?.errors || 0;
                return errB - errA;
            });
            activeQuiz = pool.slice(0, 15);
            qIndex = 0; score = 0;
            showView('view-quiz');
            renderQuestion();
        }

        function renderQuestion() {
            const q = activeQuiz[qIndex];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('quiz-progress-text').innerText = `${qIndex + 1}/${activeQuiz.length}`;
            document.getElementById('quiz-progress-fill').style.width = `${((qIndex)/activeQuiz.length)*100}%`;
            
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i, btn);
                box.appendChild(btn);
            });
            document.getElementById('question-box').style.display = 'block';
            document.getElementById('feedback-box').style.display = 'none';
        }

        function checkAnswer(idx, el) {
            const q = activeQuiz[qIndex];
            const opts = document.querySelectorAll('.option');
            opts.forEach(o => o.style.pointerEvents = 'none');

            if (idx === q.c) {
                el.classList.add('correct');
                score++; streak++;
                confetti({ particleCount: 40, spread: 60, colors: ['#9F73DA', '#35BBB2'] });
                showFeedback(true);
                resolveError(q.id);
            } else {
                el.classList.add('wrong');
                opts[q.c].classList.add('correct');
                streak = 0;
                showFeedback(false);
                saveError(q.id);
            }
            document.getElementById('streak-counter').innerText = `🔥 Racha: ${streak}`;
        }

        function showFeedback(isCorrect) {
            document.getElementById('question-box').style.display = 'none';
            document.getElementById('feedback-box').style.display = 'block';
            const img = document.getElementById('mascot-feedback');
            const txt = document.getElementById('feedback-text');
            
            // Sustitución de placeholders por URLs reales
            if (isCorrect) {
                img.src = "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose5.png";
                txt.innerHTML = "<b style='color:var(--success)'>¡Excelente!</b> El código es correcto.";
            } else {
                img.src = "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose4.png";
                txt.innerHTML = "<b style='color:var(--error)'>¡Casi!</b> El Axolote guardará esta para repasarla.";
            }
        }

        function nextQuestion() {
            qIndex++;
            if (qIndex < activeQuiz.length) renderQuestion();
            else showResults();
        }

        function showResults() {
            showView('view-results');
            document.getElementById('res-score').innerText = `${score}/${activeQuiz.length}`;
            document.getElementById('res-msg').innerText = score > 10 ? "¡Eres un genio del lenguaje estelar!" : "Buen intento. ¡La práctica hace al maestro!";
        }
    </script>
</body>
</html>
