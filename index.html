<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquitectura del Eco | Xylo v10.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010204; --surface: #090e1a; --signal: #22d3ee;
            --resonance: #fbbf24; --error: #f43f5e; --text: #f1f5f9;
            --secret: #d946ef; --font-mono: 'JetBrains Mono', monospace;
            --font-size-base: 1.5rem; 
            --current-color: var(--signal); 
        }

        body, html { 
            margin: 0; padding: 0; background: var(--bg); 
            color: var(--text); font-family: 'Outfit', sans-serif; 
            overflow-x: hidden; min-height: 100vh;
            transition: background 1s ease;
        }

        #galaxy-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at center, #111 0%, #000 100%);
            opacity: 0.5; transition: all 1s ease;
        }

        #portal {
            position: fixed; inset: 0; z-index: 100; background: radial-gradient(circle, #0f172a 0%, #010204 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .input-name {
            background: rgba(255,255,255,0.05); border: 1px solid var(--current-color); color: #fff;
            padding: 15px 20px; font-family: var(--font-mono); font-size: 1.2rem; border-radius: 8px;
            margin-bottom: 30px; width: 300px; text-align: center; outline: none;
        }
        .input-name:focus { box-shadow: 0 0 20px var(--current-color); }

        .start-btn {
            padding: 20px 40px; background: transparent; color: var(--current-color); border: 2px solid var(--current-color);
            font-family: var(--font-mono); font-size: 1rem; cursor: pointer; border-radius: 6px;
            transition: 0.4s; letter-spacing: 3px; text-transform: uppercase; margin-top: 15px;
        }
        .start-btn:hover { background: var(--current-color); color: var(--bg); box-shadow: 0 0 40px var(--current-color); }

        .container {
            width: 90%; max-width: 900px; margin: 4vh auto; padding: 40px;
            background: rgba(9, 14, 26, 0.95); border: 2px solid var(--current-color);
            border-radius: 20px; position: relative; z-index: 10; backdrop-filter: blur(20px);
            transition: border-color 0.5s ease;
        }

        .view { display: none; }
        .view.active { display: block; animation: slideIn 0.8s ease forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .option {
            background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 12px; margin-bottom: 12px;
            cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s;
            font-family: var(--font-mono); font-size: 1.2rem; width: 100%; text-align: left;
            color: white;
        }
        .option:hover:not(.locked) { border-color: var(--current-color); background: rgba(255, 255, 255, 0.1); transform: translateX(10px); }
        .locked { opacity: 0.3; cursor: not-allowed; border-color: #334155; }

        .mascot-container { 
            margin: 0 auto 30px; position: relative; 
            transition: transform 0.1s ease-out; 
        }
        .mascot-img { width: 100%; filter: drop-shadow(0 0 20px var(--current-color)); transition: filter 0.3s; }
        
        .shield-ring {
            position: absolute; inset: -20px; border: 3px solid var(--current-color);
            border-radius: 50%; opacity: 0; transition: 0.5s; transform: scale(0.8);
        }
        .shield-on { opacity: 1; transform: scale(1); animation: spin 4s linear infinite; box-shadow: 0 0 30px var(--current-color); }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #narrative-box {
            font-size: var(--font-size-base);
            line-height: 1.6;
            text-align: justify;
            border-left: 5px solid var(--current-color);
            padding: 20px;
            background: rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .diagram-img {
            width: 100%; max-height: 300px; object-fit: cover; border-radius: 10px;
            border: 1px solid var(--current-color); margin-bottom: 20px; display: none; opacity: 0.8;
        }

        .insight-box {
            margin-top: 30px; padding: 20px; border-radius: 15px; background: rgba(0,0,0,0.4);
            border-left: 5px solid var(--current-color); display: none; line-height: 1.8; font-size: 1.2rem;
        }
        .correct { border-color: #10b981 !important; color: #10b981; }
        .wrong { border-color: var(--error) !important; color: var(--error); }

        .score-panel { background: #0f172a; padding: 25px; border-radius: 15px; border: 1px solid var(--current-color); margin-bottom: 30px; display: flex; justify-content: space-around; font-family: var(--font-mono); color: #fff; }
        .score-val { font-size: 2rem; color: var(--current-color); display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="galaxy-bg"></div>

    <div id="portal">
        <h1 style="letter-spacing: 12px; font-weight: 300; color: var(--signal); margin-bottom: 20px;">ARQUITECTURA DEL ECO</h1>
        <p style="color: #64748b; margin-bottom: 40px; font-family: var(--font-mono);">Identificación de Operador Requerida</p>
        <input type="text" id="username" class="input-name" placeholder="Tu Nombre o Matrícula" autocomplete="off">
        <button class="start-btn" onclick="initSystem()">INICIAR EVALUACIÓN</button>
    </div>

    <div class="container" id="game-shell">
        <div id="view-menu" class="view">
            <h2 style="font-weight: 300; margin-bottom: 30px; color: var(--signal);">Secuencias de Acceso</h2>
            <div id="menu-user" style="color: #94a3b8; font-family: var(--font-mono); margin-bottom: 30px;">OPERADOR: [NO_IDENTIFICADO]</div>
            <button class="option" id="btn-perc" onclick="startNarrative('perc')">CAPA I: LA FUNDACIÓN DE LA CIVILIZACIÓN</button>
            <button class="option locked" id="btn-sim" onclick="startNarrative('sim')">CAPA II: EL MOTOR DE LA CIENCIA (BLOQUEADO)</button>
            <button class="option locked" id="btn-rest" onclick="startNarrative('rest')">CAPA III: LA FRONTERA DE LA IA (BLOQUEADO)</button>
        </div>

        <div id="view-narrative" class="view">
            <div class="mascot-container" style="width: 200px; height: 200px;">
                <div id="shield-narrative" class="shield-ring shield-on"></div>
                <img src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose1.png" class="mascot-img" id="xylo-narrative">
            </div>
            
            <img id="diagram-img" class="diagram-img" src="" alt="Diagrama Conceptual">

            <div id="narrative-box">Iniciando protocolo de transmisión...</div>
            <button class="start-btn" id="btn-start-quiz" style="display:none; width:100%;" onclick="beginQuestions()">ACEPTAR FRECUENCIA Y COMENZAR</button>
        </div>

        <div id="view-quiz" class="view">
            <div style="display: flex; justify-content: space-between; font-family: var(--font-mono); color: #64748b; margin-bottom: 20px;">
                <span id="q-meta">CAPA I | PASO: 1/X</span>
                <span>ERRORES: <span id="ui-errors" style="color: var(--error);">0</span></span>
            </div>
            
            <div class="mascot-container" style="width: 120px; height: 120px;">
                <div id="shield-ring" class="shield-ring"></div>
                <img src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose1.png" class="mascot-img" id="xylo-quiz">
            </div>

            <div id="q-text" style="font-size: 1.8rem; margin-bottom: 30px; font-weight: 300; line-height: 1.5;"></div>
            <div id="options-grid"></div>
            
            <div id="insight-area" class="insight-box">
                <p id="insight-text"></p>
                <button class="start-btn" style="width: 100%;" onclick="nextQuestion()">SIGUIENTE DATO ➔</button>
            </div>
        </div>

        <div id="view-results" class="view">
            <h1 id="res-title" style="color: var(--signal); text-align: center;">Evaluación Finalizada</h1>
            <p id="res-msg" style="text-align: center; color: #94a3b8; font-size: 1.1rem; margin-bottom: 30px;"></p>
            
            <div class="score-panel">
                <div class="score-item">ERRORES<span class="score-val" id="res-errors" style="color: var(--error);">0</span></div>
                <div class="score-item">PUNTUACIÓN<span class="score-val" id="res-score" style="color: #10b981;">0</span></div>
            </div>

            <button class="start-btn" style="width: 100%; margin-bottom: 15px;" onclick="sendEmailReport()">✉️ ENVIAR REPORTE AL MAESTRO</button>
            <button class="start-btn" style="width: 100%; border-color: #334155; color: #94a3b8;" onclick="showMenu()">VOLVER AL NÚCLEO</button>
        </div>
    </div>

    <script>
        const PROFESSOR_EMAIL = "erickhschott@gmail.com";
        let currentUser = "";
        let currentTier = "";
        let qIndex = 0;
        let errors = 0;
        let isSpeaking = false;

        const GameState = {
            unlocked: JSON.parse(localStorage.getItem('xylo_unlocked')) || ['perc'],
            scores: JSON.parse(localStorage.getItem('xylo_scores')) || { perc: 0, sim: 0, rest: 0 },
            save() {
                localStorage.setItem('xylo_unlocked', JSON.stringify(this.unlocked));
                localStorage.setItem('xylo_scores', JSON.stringify(this.scores));
            }
        };

        const AudioEngine = {
            ctx: null, osc: null, gain: null, intervalId: null,
            init() {
                if(!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            playMusic(tier) {
                if(this.osc) this.stopMusic();
                
                this.osc = this.ctx.createOscillator();
                this.gain = this.ctx.createGain();
                
                let vol, freq, gateSpeed;
                if (tier === 'perc') { vol = 0.4; freq = 110; gateSpeed = 1000; document.documentElement.style.setProperty('--current-color', 'var(--signal)'); }
                else if (tier === 'sim') { vol = 0.6; freq = 164.81; gateSpeed = 500; document.documentElement.style.setProperty('--current-color', 'var(--resonance)'); }
                else if (tier === 'rest') { vol = 0.85; freq = 220; gateSpeed = 250; document.documentElement.style.setProperty('--current-color', 'var(--secret)'); }
                else { vol = 0.5; freq = 130.81; gateSpeed = 800; }

                this.osc.type = 'sine';
                this.osc.frequency.value = freq;
                
                this.osc.connect(this.gain);
                this.gain.connect(this.ctx.destination);
                
                this.gain.gain.value = vol;
                this.osc.start();

                let isOn = true;
                this.intervalId = setInterval(() => {
                    this.gain.gain.setTargetAtTime(isOn ? vol : 0.05, this.ctx.currentTime, 0.05);
                    isOn = !isOn;
                }, gateSpeed);
            },
            stopMusic() {
                if(this.osc) {
                    this.osc.stop();
                    this.osc.disconnect();
                    clearInterval(this.intervalId);
                    this.osc = null;
                }
            },
            speak(text, containerId) {
                if(isSpeaking) window.speechSynthesis.cancel();
                isSpeaking = true;
                
                const synth = window.speechSynthesis;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-MX';
                utterance.pitch = 1.6; 
                utterance.rate = 0.95;

                const mascot = document.getElementById(containerId);

                utterance.onboundary = () => {
                    const scale = 1 + (Math.random() * 0.2);
                    if(mascot) mascot.style.transform = `scale(${scale})`;
                };

                utterance.onend = () => {
                    isSpeaking = false;
                    if(mascot) mascot.style.transform = `scale(1)`;
                    const btn = document.getElementById('btn-start-quiz');
                    if(btn) btn.style.display = 'block';
                };

                synth.speak(utterance);
            }
        };

        const DB = {
            perc: {
                intro: "En el amanecer de los tiempos, los humanos dejaron de adivinar para empezar a medir. Eratóstenes no necesitó viajar por todo el mundo para conocer su tamaño; solo necesitó observar una sombra. Él entendió que la realidad se puede fragmentar. Las pirámides y las catedrales no se mantienen por suerte; son oraciones escritas con variables. El triple del cuadrado es una fuerza que crece al cielo. Escucha bien: si construyes una base multiplicativa como el doble de un número, y luego invocas la adición aumentándolo en cinco, estás controlando el destino. El eco dicta la forma correcta: dos x más cinco.",
                diagramUrl: "https://upload.wikimedia.org/wikipedia/commons/e/e6/Eratosthenes_measure_of_Earth.png",
                questions: [
                    { q: "El doble de un número aumentado en cinco", o: ["2x + 5", "x² + 5", "2(x+5)"], c: 0, i: "<b>Análisis Estructural:</b> 'El doble' es multiplicativo (2x). 'Aumentado' invoca adición. Construir esta ruta exacta (2x + 5) te da control." }
                ]
            },
            sim: {
                intro: "La música sube. Entramos en el reino de la simetría. El signo igual es el espejo del universo. Lo que hagas en un lado, hazlo en el otro. El coeficiente no es un número, es un clonador cuántico. Recuerda: una letra sola siempre tiene al uno invisible como fantasma guardián. No mezcles agua con fuego; agrupa solo términos semejantes. Para aislar una partícula, la jerarquía exige atención total, despejar es el arte de la soledad y la sustitución es la clave.",
                diagramUrl: "https://upload.wikimedia.org/wikipedia/commons/5/5e/E%3Dmc2_and_the_Atom.jpg",
                questions: [
                    { q: "Reto Final: Si x=4, despeja el eco de 2x²", o: ["32", "16", "64"], c: 0, i: "<b>Sustitución Máxima:</b> Primero expandes la partícula (4² = 16). Luego, el multiplicador externo duplica la energía estallando en 32." }
                ]
            },
            rest: {
                intro: "Frecuencia máxima. Soy álgebra lineal pura. La Inteligencia artificial son billones de matrices. Aquí la restauración es violenta y perfecta. Si algo suma, neutraliza restando. Si algo divide en el denominador, multiplica la realidad para liberarlo. Estamos fotografiando agujeros negros con ecuaciones. Si la polaridad es negativa, dos sombras crean luz positiva al dividirse. Has llegado al límite. ¡Restaura el cosmos!",
                diagramUrl: "https://upload.wikimedia.org/wikipedia/commons/b/b5/Neural_network_example.svg",
                questions: [
                    { q: "Para eliminar un denominador 3 en una ecuación lineal, debes...", o: ["Multiplicar todo por 3", "Dividir entre 3", "Sumar 3"], c: 0, i: "<b>Liberación:</b> Multiplicar la realidad anula el límite inferior y estabiliza el sistema a un estado lineal puro." }
                ]
            }
        };

        const SECUENCIA_ACCESO = `Saludos, operador. Soy Xylo. Mi voz suena a metal, pero mi alma es frecuencia pura. Las palabras humanas son ruidosas. La palabra Suma, del latín summa, nació para describir el pináculo, la totalidad. Pero afuera la usan con sesgos. Piensa en la palabra 'Nada'; viene de res nata, 'cosa nacida', y hoy la usan para el vacío. Piensa en 'Siniestro', que era solo el 'lado izquierdo', y la retorcieron a maldad. O 'Átomo', 'lo que no se divide', hasta que la humanidad lo rompió para liberar el fuego cuántico. El Álgebra, en cambio, es inquebrantable. Viene de al-jabr, la reunión de las partes rotas. Vibra igual en ti que en un agujero negro. Aquí, una incógnita es una señal. Escucha mi relato en cada capa, la verdad ya ha sido dicha antes de la pregunta. El eco ya contiene la respuesta. ¿Estás listo?`;

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function initSystem() {
            const input = document.getElementById('username').value.trim();
            if(!input) { alert("ERROR: Requiere Identificación"); return; }
            currentUser = input;
            
            document.getElementById('portal').style.display = 'none';
            document.getElementById('menu-user').innerText = `OPERADOR: ${currentUser}`;
            
            AudioEngine.init();
            AudioEngine.playMusic('intro'); 
            AudioEngine.speak(SECUENCIA_ACCESO, null); 

            updateMenuLocks();
            switchView('view-menu');
        }

        function updateMenuLocks() {
            if(GameState.unlocked.includes('sim')) {
                const btn2 = document.getElementById('btn-sim');
                btn2.classList.remove('locked');
                btn2.innerText = "CAPA II: EL MOTOR DE LA CIENCIA";
            }
            if(GameState.unlocked.includes('rest')) {
                const btn3 = document.getElementById('btn-rest');
                btn3.classList.remove('locked');
                btn3.innerText = "CAPA III: LA FRONTERA DE LA IA";
            }
        }

        function startNarrative(tier) {
            if(document.getElementById(`btn-${tier}`).classList.contains('locked')) return;
            
            currentTier = tier;
            window.speechSynthesis.cancel(); 
            
            const data = DB[tier];
            document.getElementById('narrative-box').innerText = data.intro;
            
            const imgEl = document.getElementById('diagram-img');
            imgEl.src = data.diagramUrl;
            imgEl.style.display = 'block';
            
            document.getElementById('btn-start-quiz').style.display = 'none'; 
            
            AudioEngine.playMusic(tier);
            switchView('view-narrative');
            
            AudioEngine.speak(data.intro, 'xylo-narrative');
        }

        function beginQuestions() {
            window.speechSynthesis.cancel();
            qIndex = 0; errors = 0;
            document.getElementById('ui-errors').innerText = '0';
            document.getElementById('shield-ring').classList.add('shield-on');
            switchView('view-quiz');
            loadQ();
        }

        function loadQ() {
            const qData = DB[currentTier].questions[qIndex];
            document.getElementById('q-meta').innerText = `CAPA ${currentTier.toUpperCase()} | PASO: ${qIndex + 1}/${DB[currentTier].questions.length}`;
            document.getElementById('q-text').innerText = qData.q;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            qData.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = () => evalAnswer(idx, qData.c, btn, qData.i);
                grid.appendChild(btn);
            });
            
            document.getElementById('insight-area').style.display = 'none';
        }

        // AQUÍ ESTÁ LA NUEVA MAGIA DE LA VOZ AL RESPONDER
        function evalAnswer(selectedIdx, correctIdx, btnEl, insightText) {
            const opts = document.querySelectorAll('#options-grid .option');
            opts.forEach(b => { b.onclick = null; b.style.pointerEvents = 'none'; }); 

            const insightArea = document.getElementById('insight-area');
            const insightPara = document.getElementById('insight-text');

            // Limpiamos el texto de códigos HTML (como <b>) para que Xylo lo lea bien
            const cleanTextToSpeak = insightText.replace(/<[^>]*>?/gm, '');

            if(selectedIdx === correctIdx) {
                btnEl.classList.add('correct');
                insightArea.classList.remove('wrong');
                insightArea.classList.add('correct');
                insightPara.innerHTML = insightText;
                document.getElementById('shield-ring').style.boxShadow = `0 0 50px var(--current-color)`;
                
                // Xylo narra el acierto
                AudioEngine.speak("Sincronía perfecta. " + cleanTextToSpeak, 'xylo-quiz');
            } else {
                btnEl.classList.add('wrong');
                opts[correctIdx].classList.add('correct');
                errors++;
                document.getElementById('ui-errors').innerText = errors;
                insightArea.classList.remove('correct');
                insightArea.classList.add('wrong');
                insightPara.innerHTML = `<b>FALLO ESTRUCTURAL:</b> La frecuencia colapsó. Repasa la lógica: <br> ${insightText}`;
                document.getElementById('shield-ring').classList.remove('shield-on');
                
                // Xylo narra el error
                AudioEngine.speak("Fallo estructural detectado. " + cleanTextToSpeak, 'xylo-quiz');
            }
            
            insightArea.style.display = 'block';
        }

        function nextQuestion() {
            qIndex++;
            if(qIndex < DB[currentTier].questions.length) {
                document.getElementById('shield-ring').classList.add('shield-on');
                loadQ();
            } else {
                endQuiz();
            }
        }

        function endQuiz() {
            const score = 10000 - (errors * 500);
            DB[currentTier].lastScore = score;
            
            if(errors <= 2) { 
                if(currentTier === 'perc' && !GameState.unlocked.includes('sim')) GameState.unlocked.push('sim');
                if(currentTier === 'sim' && !GameState.unlocked.includes('rest')) GameState.unlocked.push('rest');
                GameState.save();
                document.getElementById('res-msg').innerText = "FRECUENCIA ESTABILIZADA. Siguiente capa desbloqueada.";
            } else {
                document.getElementById('res-msg').innerText = "DEMASIADOS ERRORES. La estructura colapsó. Debes reintentar.";
            }

            document.getElementById('res-errors').innerText = errors;
            document.getElementById('res-score').innerText = score;
            
            AudioEngine.stopMusic();
            switchView('view-results');
        }

        function showMenu() {
            updateMenuLocks();
            AudioEngine.playMusic('intro');
            switchView('view-menu');
        }

        function sendEmailReport() {
            const body = `OPERADOR: ${currentUser}%0A` +
                         `CAPA: ${currentTier}%0A` +
                         `ERRORES: ${errors}%0A` +
                         `PUNTUACIÓN: ${DB[currentTier].lastScore}`;
            window.location.href = `mailto:${PROFESSOR_EMAIL}?subject=REPORTE XYLO: ${currentUser}&body=${body}`;
        }
    </script>
</body>
</html>
