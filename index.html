<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintonía Algebraica: El Camino a la Eudaimonía</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --primary: #8b5cf6; --secondary: #06b6d4; --accent: #fbbf24;
            --success: #10b981; --error: #ef4444;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            background: var(--card); width: 100%; max-width: 650px; padding: 30px;
            border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05); position: relative;
        }

        /* --- ESCUDO DE RESONANCIA (LUCES QUE SE MUEVEN) --- */
        .shield-wrapper { text-align: right; }
        .shield-label { font-size: 0.65rem; font-weight: bold; color: var(--secondary); letter-spacing: 1px; }
        .shield-bar { 
            width: 140px; height: 10px; background: #334155; border-radius: 20px; 
            margin-top: 5px; overflow: hidden; position: relative; display: inline-block;
        }
        .shield-fill { height: 100%; width: 0%; background: var(--secondary); transition: 0.5s ease; }

        /* Animación cuando hay resonancia plena (3 aciertos) */
        .resonance-glow {
            background: linear-gradient(90deg, #fbbf24, #fffbeb, #fbbf24);
            background-size: 200% 100%;
            animation: move-lights 1.5s linear infinite, pulse-glow 2s infinite alternate;
            box-shadow: 0 0 15px var(--accent);
            width: 100% !important;
        }

        @keyframes move-lights { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes pulse-glow { from { opacity: 0.7; } to { opacity: 1; } }

        /* --- ESTILOS DE INTERFAZ --- */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .lives { font-size: 1.2rem; filter: drop-shadow(0 0 5px var(--primary)); }
        
        .btn-main { 
            width: 100%; padding: 20px; background: var(--primary); color: white; border: none; 
            border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s;
            margin-bottom: 15px; position: relative; overflow: hidden;
        }
        .btn-main:disabled { background: #334155; color: #64748b; cursor: not-allowed; opacity: 0.5; }
        .btn-main:active:not(:disabled) { transform: scale(0.98); }

        .view { display: none; animation: slideIn 0.5s ease-out forwards; }
        .view.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .option { 
            background: #334155; padding: 18px; margin: 12px 0; border-radius: 18px; 
            cursor: pointer; border: 2px solid transparent; transition: 0.2s; font-size: 1.1rem;
        }
        .option:hover { background: #475569; }
        .correct { background: #064e3b !important; border-color: var(--success) !important; }
        .wrong { background: #7f1d1d !important; border-color: var(--error) !important; }

        .insight-box {
            background: rgba(6, 182, 212, 0.1); border: 1px solid var(--secondary);
            padding: 15px; border-radius: 15px; margin-top: 20px; text-align: center;
            animation: fadeIn 0.5s ease;
        }
        .mascot { width: 130px; display: block; margin: 0 auto 15px; }
        
        /* Progress Bar */
        .p-bar { height: 6px; background: #334155; border-radius: 3px; margin: 20px 0; overflow: hidden; }
        .p-fill { height: 100%; background: var(--secondary); width: 0%; transition: 0.4s; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="lives" id="lives-display">✨✨✨✨✨</div>
            <div class="shield-wrapper">
                <div class="shield-label">RESONANCIA CRÍTICA</div>
                <div class="shield-bar"><div id="shield-fill" class="shield-fill"></div></div>
            </div>
        </div>

        <div id="view-menu" class="view active">
            <h1 style="margin-bottom: 10px; color: var(--secondary);">La Búsqueda del Equilibrio</h1>
            <p style="color: #94a3b8; line-height: 1.6; margin-bottom: 30px;">
                Bienvenido al camino de la <b>Eudaimonía</b>. Aprender álgebra no es resolver números, es descubrir las leyes que mantienen el universo en equilibrio.
            </p>
            <button class="btn-main" onclick="startLesson()">I. El Origen de la Verdad (Lección) 👁️</button>
            <button class="btn-main" id="btn-warmup" style="background: var(--secondary);" onclick="startQuiz('sintonia')" disabled>II. Sintonía de Patrones ⚡</button>
            <button class="btn-main" id="btn-challenge" style="background: #475569;" onclick="startQuiz('arquitectura')" disabled>III. La Arquitectura del Cosmos 🏆</button>
            <center><button onclick="resetApp()" style="background:none; border:none; color:#475569; font-size:0.7rem; cursor:pointer; margin-top:15px;">[Reiniciar Reflexión]</button></center>
        </div>

        <div id="view-lesson" class="view">
            <div id="lesson-content" style="text-align: center; min-height: 380px;"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background: #475569;" onclick="changeSlide(-1)">Atrás</button>
                <button class="btn-main" id="btn-next-slide" onclick="changeSlide(1)">Continuar</button>
            </div>
        </div>

        <div id="view-quiz" class="view">
            <div style="display:flex; justify-content: space-between; font-size: 0.8rem; color: var(--secondary);">
                <span id="quiz-title-text">SINTONIZANDO...</span>
                <span id="quiz-count">0/0</span>
            </div>
            <div class="p-bar"><div id="quiz-p-fill" class="p-fill"></div></div>
            <h2 id="q-text" style="text-align: center; margin: 30px 0;"></h2>
            <div id="options-container"></div>
            
            <div id="feedback-area" style="display: none;">
                <div class="insight-box">
                    <img src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose5.png" class="mascot">
                    <p id="insight-text" style="font-style: italic;"></p>
                    <button class="btn-main" onclick="handleNext()">Seguir Descubriendo ➔</button>
                </div>
            </div>
        </div>

        <div id="view-results" class="view" style="text-align: center;">
            <img src="https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose5.png" class="mascot" style="width: 160px;">
            <h1 id="res-title"></h1>
            <p id="res-msg" style="line-height: 1.6; color: #94a3b8;"></p>
            <button class="btn-main" onclick="location.reload()">Regresar al Inicio 🏠</button>
        </div>
    </div>

    <script>
        /* --- FILOSOFÍA Y CONTENIDO (Basado en 1º Secundaria Edomex) --- */
        const lessonSlides = [
            { t: "Etimología: La Igualdad", d: "La palabra <b>Ecuación</b> viene del latín <i>aequatio</i>, que significa 'hacer igual'. En el universo, todo busca el equilibrio. El signo '=' no es un resultado, es el centro de una balanza.", i: "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose1.png" },
            { t: "El Silencio de la Verdad (x)", d: "Cuando nos falta un dato, no inventamos. Dejamos un espacio ($x$). Resolver una ecuación es simplemente quitar el ruido que rodea a esa verdad para verla con claridad.", i: "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose3.png" },
            { t: "La Ley de la Balanza", d: "Para mantener la verdad, lo que haces en un lado de la balanza, debes hacerlo en el otro. Si sumas conciencia en un lado, debes sumarla en el otro para que la igualdad no se rompa.", i: "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose2.png" },
            { t: "Hacia la Eudaimonía", d: "Al dominar estas estructuras, tu mente florece. No estás haciendo tarea; estás entrenando tu pensamiento crítico para que nadie te engañe con palabras confusas.", i: "https://raw.githubusercontent.com/erickHSchott/Schott-academia-algebra/main/pose5.png" }
        ];

        const bankSintonia = [
            { q: "Traduce: 'Un número que al sumarle 7 da 15'", a: ["x + 7 = 15", "7x = 15", "x - 7 = 15"], c: 0, h: "La suma es la estructura del crecimiento; aquí buscamos qué semilla original creció hasta ser 15." },
            { q: "Traduce: 'El triple de mi edad es 45'", a: ["x + 3 = 45", "3x = 45", "x/3 = 45"], c: 1, h: "La multiplicación representa la fuerza de repetición. Si te repites tres veces y llegas a 45, tu esencia es 15." },
            { q: "Traduce: 'Un valor disminuido en 10 es igual a 20'", a: ["10 - x = 20", "x - 10 = 20", "x/10 = 20"], c: 1, h: "La resta es la distancia. Aunque algo se haya perdido (-10), la estructura original sigue ahí esperando ser descubierta." },
            { q: "La estructura de la repartición: 'Un número dividido entre 2 da 8'", a: ["2x = 8", "x/2 = 8", "x + 2 = 8"], c: 1, h: "Dividir es fragmentar la verdad. Si la mitad de algo es 8, la totalidad es una fuerza mayor (16)." },
            { q: "Traduce: 'La suma de dos números consecutivos es 13'", a: ["x + x = 13", "x + (x + 1) = 13", "2x + 13"], c: 1, h: "El orden natural se expresa sumando una unidad de conciencia ($x+1$)."}
        ];

        const bankArquitectura = [
            { q: "Si $x + 5 = 12$, ¿cuál es la verdad oculta?", a: ["x = 17", "x = 7", "x = 5"], c: 1, h: "Al restar 5 en ambos lados, restauramos el equilibrio y la verdad ($x=7$) emerge sin ruido." },
            { q: "En Física, $F = ma$. Si $F=20$ y $m=5$, ¿cuánta es la aceleración ($a$)?", a: ["a = 4", "a = 15", "a = 100"], c: 0, h: "¡Exacto! El álgebra permite a la ciencia predecir el movimiento de las estrellas usando esta misma estructura." },
            { q: "Si $3x = 18$, ¿cuánto vale la unidad?", a: ["x = 21", "x = 15", "x = 6"], c: 2, h: "Dividir entre 3 en ambos lados es un acto de justicia: le das a cada parte lo que le corresponde para hallar el origen." },
            { q: "Encuentra el equilibrio: $x - 8 = 10$", a: ["x = 2", "x = 18", "x = 80"], c: 1, h: "Sumar 8 en ambos lados es como devolver lo que se quitó para recuperar la integridad original." },
            { q: "Si el doble de un número más 1 es 11 ($2x + 1 = 11$), ¿cuál es el número?", a: ["x = 5", "x = 10", "x = 6"], c: 0, h: "Has resuelto una estructura compleja. Primero quitamos el ruido extra (+1) y luego dividimos para llegar a la esencia." }
        ];

        /* --- LÓGICA DEL SISTEMA --- */
        let lives = 5, streak = 0, hasShield = false, qIdx = 0, currentSlide = 0;
        let activeBank = [], progress = JSON.parse(localStorage.getItem('edu_progress')) || { l: false, w: false };

        function save() { localStorage.setItem('edu_progress', JSON.stringify(progress)); checkUnlock(); }
        function checkUnlock() {
            document.getElementById('btn-warmup').disabled = !progress.l;
            document.getElementById('btn-challenge').disabled = !progress.w;
        }
        checkUnlock();

        // --- LECCIÓN ---
        function startLesson() { showView('view-lesson'); currentSlide = 0; renderSlide(); }
        function renderSlide() {
            const s = lessonSlides[currentSlide];
            document.getElementById('lesson-content').innerHTML = `<img src="${s.i}" class="mascot"><h2>${s.t}</h2><p style="line-height:1.7">${s.d}</p>`;
            document.getElementById('btn-next-slide').innerText = currentSlide === lessonSlides.length-1 ? "Completar Reflexión" : "Siguiente";
        }
        function changeSlide(dir) {
            currentSlide += dir;
            if (currentSlide < 0) showView('view-menu');
            else if (currentSlide >= lessonSlides.length) { progress.l = true; save(); showView('view-menu'); }
            else renderSlide();
        }

        // --- QUIZ ---
        function startQuiz(mode) {
            lives = 5; streak = 0; hasShield = false; qIdx = 0;
            activeBank = mode === 'sintonia' ? [...bankSintonia] : [...bankArquitectura];
            activeBank.sort(() => Math.random() - 0.5);
            document.getElementById('quiz-title-text').innerText = mode.toUpperCase();
            updateStats(); showView('view-quiz'); renderQuestion();
        }

        function renderQuestion() {
            const q = activeBank[qIdx];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('quiz-count').innerText = `${qIdx + 1}/${activeBank.length}`;
            document.getElementById('quiz-p-fill').style.width = `${(qIdx / activeBank.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.a.forEach((opt, i) => {
                const d = document.createElement('div');
                d.className = 'option'; d.innerText = opt;
                d.onclick = () => checkAnswer(i, d);
                container.appendChild(d);
            });
            document.getElementById('feedback-area').style.display = 'none';
            container.style.display = 'block';
        }

        function checkAnswer(idx, el) {
            const q = activeBank[qIdx];
            document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none');
            
            if (idx === q.c) {
                el.classList.add('correct'); streak++;
                if (streak >= 3) hasShield = true;
                confetti({ particleCount: 40, spread: 60, colors: ['#06b6d4', '#fbbf24'] });
                showInsight(q.h);
            } else {
                el.classList.add('wrong');
                document.querySelectorAll('.option')[q.c].classList.add('correct');
                if (hasShield) hasShield = false; else lives--;
                streak = 0;
                activeBank.push(activeBank[qIdx]); // Repetir al final
                setTimeout(() => { if (lives <= 0) gameOver(); else handleNext(); }, 1500);
            }
            updateStats();
        }

        function showInsight(text) {
            document.getElementById('options-container').style.display = 'none';
            document.getElementById('insight-text').innerText = text;
            document.getElementById('feedback-area').style.display = 'block';
        }

        function handleNext() {
            qIdx++;
            if (qIdx < activeBank.length) renderQuestion();
            else finishQuiz();
        }

        function updateStats() {
            document.getElementById('lives-display').innerText = "✨".repeat(Math.max(0, lives));
            const fill = document.getElementById('shield-fill');
            fill.classList.toggle('resonance-glow', hasShield);
            if (!hasShield) fill.style.width = (streak % 3) * 33 + "%";
        }

        function finishQuiz() {
            showView('view-results');
            const isWarmup = activeBank.length === bankSintonia.length;
            if (isWarmup) progress.w = true;
            save();
            document.getElementById('res-title').innerText = "Eudaimonía Alcanzada";
            document.getElementById('res-msg').innerText = "Has demostrado que tu razón puede ver a través del ruido. El equilibrio del universo es ahora parte de tu comprensión.";
        }

        function gameOver() {
            showView('view-results');
            document.getElementById('res-title').innerText = "Mente Nublada";
            document.getElementById('res-msg').innerText = "Demasiado ruido por hoy. Descansa, reflexiona sobre el equilibrio y vuelve cuando tu atención sea pura.";
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function resetApp() { localStorage.clear(); location.reload(); }
    </script>
</body>
